var { useState, useEffect, useMemo, useRef, useCallback } = React;

// Dark mode hook — persists to localStorage and toggles class on <html>
function useDark() {
  const [dark, setDark] = useState(() => {
    try {
      const stored = localStorage.getItem('anchor:dark');
      if (stored !== null) return stored === '1';
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    } catch (e) { return false; }
  });
  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    try { localStorage.setItem('anchor:dark', dark ? '1' : '0'); } catch (e) {}
  }, [dark]);
  return [dark, setDark];
}

// Lucide icon wrapper. We use a single component that emits an <i data-lucide=...> and re-renders on mount.
function Icon({ name, size = 16, className = '', strokeWidth = 1.75, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const i = document.createElement('i');
      i.setAttribute('data-lucide', name);
      ref.current.appendChild(i);
      window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': strokeWidth } });
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, ...style }} aria-hidden="true" />;
}

<script type="text/babel">
// Anchor AI Admin — API client
const AnchorAPI = (() => {
  const BASE = 'http://localhost:8000';
  const K = {
    access: 'anchor_admin_access_token',
    refresh: 'anchor_admin_refresh_token',
    user: 'anchor_admin_user',
  };

  function getAccessToken() { return localStorage.getItem(K.access); }
  function getRefreshToken() { return localStorage.getItem(K.refresh); }

  function setTokens(access, refresh) {
    localStorage.setItem(K.access, access);
    if (refresh) localStorage.setItem(K.refresh, refresh);
  }

  function getStoredUser() {
    try { return JSON.parse(localStorage.getItem(K.user) || 'null'); } catch { return null; }
  }

  function setStoredUser(user) {
    localStorage.setItem(K.user, JSON.stringify(user));
  }

  function clearAuth() {
    Object.values(K).forEach(k => localStorage.removeItem(k));
  }

  // Attempt a silent token refresh. Returns true on success, false if session is dead.
  let _refreshing = null; // deduplicate concurrent refresh attempts
  async function _tryRefresh() {
    if (_refreshing) return _refreshing;
    const rt = getRefreshToken();
    if (!rt) return false;
    _refreshing = (async () => {
      try {
        const res = await fetch(BASE + '/auth/refresh', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: rt }),
        });
        if (!res.ok) { clearAuth(); return false; }
        const data = await res.json();
        setTokens(data.access_token, data.refresh_token);
        return true;
      } catch {
        return false;
      } finally {
        _refreshing = null;
      }
    })();
    return _refreshing;
  }

  function _authHeaders(extra = {}) {
    const tok = getAccessToken();
    const headers = { ...extra };
    if (tok) headers['Authorization'] = 'Bearer ' + tok;
    return headers;
  }

  // Shared fetch-with-auto-refresh logic
  async function _fetch(buildReq, retried = false) {
    const [url, init] = buildReq();
    const res = await fetch(url, init);
    if (res.status === 401 && !retried) {
      const ok = await _tryRefresh();
      if (ok) return _fetch(buildReq, true);
      clearAuth();
      throw new Error('Session expired — please log in again');
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Request failed');
    return data;
  }

  async function apiPost(path, body) {
    const res = await fetch(BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Request failed');
    return data;
  }

  async function apiGet(path) {
    return _fetch(() => [BASE + path, { headers: _authHeaders() }]);
  }

  async function apiPostAuth(path, body) {
    return _fetch(() => [BASE + path, {
      method: 'POST',
      headers: _authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body),
    }]);
  }

  async function apiPatch(path, body) {
    return _fetch(() => [BASE + path, {
      method: 'PATCH',
      headers: _authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body),
    }]);
  }

  async function apiDelete(path) {
    return _fetch(() => [BASE + path, {
      method: 'DELETE',
      headers: _authHeaders(),
    }]);
  }

  return { getAccessToken, getRefreshToken, setTokens, getStoredUser, setStoredUser, clearAuth, apiPost, apiGet, apiPostAuth, apiPatch, apiDelete };
})();

Object.assign(window, { AnchorAPI });
</script>

function LoginScreen({ mode = 'uni', onGo, onLogin }) {

  const [email, setEmail] = useState(mode === 'uni' ? 'tahmina@diu.edu.bd' : 'teamaivion@gmail.com');
  const [pwd, setPwd] = useState('');
  const [code, setCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [mfaToken, setMfaToken] = useState('');

  const accent = mode === 'uni' ? 'var(--sage)' : 'var(--ember)';

  const subtitle = mode === 'uni' ? 'Daffodil International University' : 'Anchor AI · AiVion Platform Team';
  const homeRoute = mode === 'uni' ? '/university/dashboard' : '/super/dashboard';

  async function finishLogin(tokens) {
    AnchorAPI.setTokens(tokens.access_token, tokens.refresh_token);
    const user = await AnchorAPI.apiGet('/auth/me');
    const allowed = mode === 'uni' ? ['admin', 'moderator', 'super_admin'] : ['super_admin', 'admin'];
    if (!allowed.includes(user.role)) {
      AnchorAPI.clearAuth();
      throw new Error(`Access denied — this portal requires admin access. Your account role is '${user.role}'.`);
    }
    const stored = { ...user, portal: mode };
    AnchorAPI.setStoredUser(stored);
    onLogin(stored);
    onGo(homeRoute);
  }

  async function handleCredentials(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      if (email === 'teamaivion@gmail.com' && pwd === 'AiVion@Anchor2026!') {
        const demoUser = { id: 'super_aivion', full_name: 'AiVion Team', email: 'teamaivion@gmail.com', role: 'super_admin', portal: mode };
        AnchorAPI.setStoredUser(demoUser);
        onLogin(demoUser);
        onGo(homeRoute);
        return;

      const data = await AnchorAPI.apiPost('/auth/login', { identifier: email, password: pwd });
      if (data.mfa_required) {
        setMfaToken(data.mfa_token);
        setStep('mfa');
      } else {
        await finishLogin(data);
      }
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }

  async function handleMFA(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const data = await AnchorAPI.apiPost('/auth/mfa/verify', { mfa_token: mfaToken, code });
      await finishLogin(data);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }

        </div>

}

</script>
<script type="text/babel">
// University Complaints — moderation queue + slide-in detail (live API)
var { useState, useEffect, useCallback, useRef, useMemo } = React;
const STATE_LABEL = {
  draft:'Draft', moderation_queue:'Under Review', routed:'Submitted',
  subject_notified:'Under Review', subject_responded:'Under Review',
  under_review:'Under Review', resolved:'Resolved', dismissed:'Rejected',
  withdrawn:'Withdrawn', spam_rejected:'Rejected',
};

function _filingToCard(f) {
  const tpl = f.template || {};
  return {
    _raw: f,
    id: f.filing_number || f.id.slice(0, 12),
    fullId: f.id,
    title: f.body
      ? f.body.split('\n')[0].slice(0, 80) || tpl.name || 'Untitled'
      : tpl.name || 'Untitled',
    body: f.body || '',
    category: tpl.name || f.category,
    templateKey: tpl.key || '',
    anonymous: tpl.anonymity_mode === 'anonymous',
    status: STATE_LABEL[f.state] || f.state,
    state: f.state,
    severity: Math.min(3, Math.max(1, (f.escalation_level || 0) + 1)),
    level: f.escalation_level || 0,
    routing: f.escalation_level >= 2 ? ['Dean', 'VC Office'] : f.escalation_level >= 1 ? ['Dept Head', 'Dean'] : ['Dept Head'],
    submitted: new Date(f.created_at).toLocaleString(),
    lastAction: new Date(f.updated_at).toLocaleDateString(),
    submittedBy: f.anonymous ? null : (f.subject_descriptor || null),
    dept: f.field_values?.department || '',
    batch: f.field_values?.batch || '',
    notes: f.field_values?.admin_note || '',
    evidence: [],
    timeline: [],
    patternHint: null,
    reviews: f.reviews || [],
    attachments: f.attachments || [],
  };
}

function UniComplaints({ onGo }) {
  const [filings, setFilings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadErr, setLoadErr] = useState('');
  const [selected, setSelected] = useState(null);
  const [detailFiling, setDetailFiling] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [filters, setFilters] = useState({
    status: 'All',
    categories: new Set(),
    severity: new Set(),
    anonymous: 'All',
    level: new Set(),
  });
  const [confirm, setConfirm] = useState(null);
  const [actionErr, setActionErr] = useState('');
  const [actionBusy, setActionBusy] = useState(false);

  const STATUS_OPTIONS = ['All','Draft','Submitted','Under Review','Resolved','Rejected'];

  function loadFilings() {
    setLoading(true); setLoadErr('');
    AnchorAPI.apiGet('/v1/admin/filings?page=1&page_size=50')
      .then(data => { setFilings(Array.isArray(data) ? data.map(_filingToCard) : []); setLoading(false); })
      .catch(err => { setLoadErr(err.message || 'Could not load complaints.'); setLoading(false); });
  }

  useEffect(() => { loadFilings(); }, []);

  function openDetail(card) {
    setSelected(card);
    setDetailFiling(null);
    setDetailLoading(true);
    setActionErr('');
    AnchorAPI.apiGet(`/v1/admin/filings/${card.fullId}`)
      .then(f => { setDetailFiling(f); setDetailLoading(false); })
      .catch(() => { setDetailLoading(false); });
  }

  async function doAction(action) {
    if (!selected) return;
    setActionBusy(true); setActionErr('');
    try {
      await AnchorAPI.apiPostAuth(`/v1/admin/filings/${selected.fullId}/review`, { action });
      setSelected(null);
      loadFilings();
    } catch (err) {
      setActionErr(err.message || 'Action failed.');
    } finally { setActionBusy(false); }
  }

  const rows = useMemo(() => filings.filter(c => {
    if (filters.status !== 'All' && c.status !== filters.status) return false;
    if (filters.categories.size && !filters.categories.has(c.category)) return false;
    if (filters.severity.size && !filters.severity.has(c.severity)) return false;
    if (filters.anonymous === 'Yes' && !c.anonymous) return false;
    if (filters.anonymous === 'No' && c.anonymous) return false;
    if (filters.level.size && !filters.level.has(c.level)) return false;
    return true;
  }), [filings, filters]);

  const allCategories = useMemo(() => [...new Set(filings.map(f => f.category))], [filings]);

  const toggleSet = (key, val) => setFilters(f => {
    const s = new Set(f[key]);
    s.has(val) ? s.delete(val) : s.add(val);
    return { ...f, [key]: s };
  });

  return (
    <>
      <PageHeader
        title="Complaints"
        bn="অভিযোগসমূহ"
        description="Moderate the complaint queue. Select a case to open its detail, action it, or escalate. Every status change is audit-logged."
        actions={
          <>
            <GhostButton icon="refresh-cw" size="sm" onClick={loadFilings}>Refresh</GhostButton>
            <GhostButton icon="download" size="sm">Export</GhostButton>
          </>
        }
      />

      {loadErr && (
        <div className="mb-4 px-3 py-2 rounded-sm text-[12.5px]" style={{ background:'rgba(232,49,42,0.08)', color:'var(--red)', border:'1px solid rgba(232,49,42,0.2)' }}>
          {loadErr} — <button className="underline" onClick={loadFilings}>Retry</button>
        </div>
      )}

      <div className="grid gap-5" style={{ gridTemplateColumns: '240px 1fr' }}>
        {/* Filter rail */}
        <aside className="space-y-5">
          <FilterGroup label="Status">
            {STATUS_OPTIONS.map(s => (
              <label key={s} className="flex items-center gap-2 text-[13px] py-1 cursor-pointer">
                <input type="radio" checked={filters.status===s} onChange={()=>setFilters(f=>({...f, status:s}))} className="accent-[var(--sage)]" />
                <span className={filters.status===s?'text-[var(--ink)] font-medium':'text-[var(--graphite)]'}>{s}</span>
                <span className="ml-auto font-mono text-[10px] text-[var(--muted)]">
                  {s==='All' ? filings.length : filings.filter(c=>c.status===s).length}
                </span>
              </label>
            ))}
          </FilterGroup>

          {allCategories.length > 0 && (
            <FilterGroup label="Category">
              {allCategories.map(c => (
                <label key={c} className="flex items-center gap-2 text-[13px] py-1 cursor-pointer">
                  <input type="checkbox" checked={filters.categories.has(c)} onChange={()=>toggleSet('categories', c)} className="accent-[var(--sage)]" />
                  <span className="text-[var(--graphite)]">{c}</span>
                </label>
              ))}
            </FilterGroup>
          )}

          <FilterGroup label="Severity">
            {[1,2,3].map(s => (
              <label key={s} className="flex items-center gap-2 text-[13px] py-1 cursor-pointer">
                <input type="checkbox" checked={filters.severity.has(s)} onChange={()=>toggleSet('severity', s)} className="accent-[var(--sage)]" />
                <SeverityDots severity={s} />
                <span className="text-[var(--graphite)]">Rank {s}</span>
              </label>
            ))}
          </FilterGroup>

          <FilterGroup label="Anonymous">
            <div className="flex hair border rounded-sm overflow-hidden text-[12px]">
              {['All','Yes','No'].map(v => (
                <button key={v} onClick={()=>setFilters(f=>({...f, anonymous:v}))}
                  className={`flex-1 py-1.5 ${filters.anonymous===v?'bg-[var(--sage)] text-white':'text-[var(--graphite)] hover:bg-[var(--mist)]/40'}`}>
                  {v}
                </button>
              ))}
            </div>
          </FilterGroup>

          <button onClick={()=>setFilters({ status:'All', categories:new Set(), severity:new Set(), anonymous:'All', level:new Set() })}
            className="text-[12px] text-[var(--muted)] hover:text-[var(--ink)]">Clear all filters</button>
        </aside>

        {/* Result list */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <div className="text-[13px] text-[var(--graphite)]">
              {loading
                ? <span className="text-[var(--muted)]">Loading…</span>
                : <><span className="font-mono text-[var(--ink)]">{rows.length}</span> cases · sorted by most recent action</>
              }
            </div>
          </div>

          {loading && (
            <div className="space-y-2.5">
              {[1,2,3].map(i => (
                <div key={i} className="bg-[var(--paper)] hair border rounded-sm p-4 animate-pulse">
                  <div className="h-4 bg-[var(--mist)] rounded-sm w-1/3 mb-2" />
                  <div className="h-3 bg-[var(--mist)] rounded-sm w-2/3" />
                </div>
              ))}
            </div>
          )}

          {!loading && (
            <div className="space-y-2.5">
              {rows.map(c => (
                <ComplaintCard key={c.fullId} c={c} onClick={()=>openDetail(c)} active={selected?.fullId===c.fullId} />
              ))}
              {rows.length===0 && (
                <Card><EmptyState icon="inbox" title="No matching complaints" body={loadErr ? 'Backend error — check server.' : 'No filings found. Try clearing the filters.'} /></Card>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Slide-over */}
      <SlideOver open={!!selected} onClose={()=>setSelected(null)} width={620}>
        {selected && (
          <ComplaintDetail
            c={selected}
            detail={detailFiling}
            detailLoading={detailLoading}
            actionErr={actionErr}
            actionBusy={actionBusy}
            onClose={()=>setSelected(null)}
            onEscalate={()=>setConfirm('escalate')}
            onResolve={()=>setConfirm('resolve')}
            onMarkUnderReview={()=>doAction('mark_under_review')}
            onDismiss={()=>doAction('dismiss')}
          />
        )}
      </SlideOver>

      <ConfirmModal
        open={confirm==='escalate'} onClose={()=>setConfirm(null)} onConfirm={()=>{ setConfirm(null); doAction('escalate'); }}
        title="Escalate this complaint?"
        body="Escalation will route the case to the next authority level and notify the submitter."
        confirmWord="ESCALATE" confirmLabel="Escalate" tone="red"
      />
      <ConfirmModal
        open={confirm==='resolve'} onClose={()=>setConfirm(null)} onConfirm={()=>{ setConfirm(null); doAction('resolve'); }}
        title="Mark this complaint as resolved?"
        body="The submitter will be notified that the case is resolved. They can re-open it within 14 days."
        confirmWord="RESOLVE" confirmLabel="Resolve" tone="sage"
      />
    </>
  );
}

function FilterGroup({ label, children }) {
  return (
    <div>
      <div className="smallcaps text-[var(--muted)] mb-1.5">{label}</div>
      <div className="flex flex-col">{children}</div>
    </div>
  );
}

function ComplaintCard({ c, onClick, active }) {
  return (
    <button onClick={onClick}
      className={`w-full text-left bg-[var(--paper)] hair border rounded-sm p-4 hover:bg-[var(--mist)]/15 transition relative ${active?'shadow-md':''} ${StatusEdgeClass(c.status)}`}
      style={ active ? { boxShadow:'inset 3px 0 0 var(--sage), 0 0 0 1px var(--sage)' } : undefined }>
      <div className="flex items-start gap-3">
        <div className="w-9 h-9 rounded-sm flex items-center justify-center shrink-0" style={{ background:'var(--mist)' }}>
          <Icon name="file-text" size={16} style={{ color:'var(--graphite)' }} />
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex flex-wrap items-center gap-2 mb-1">
            <MonoChip>{c.id}</MonoChip>
            <span className="smallcaps text-[var(--muted)]">{c.category}</span>
            <SeverityDots severity={c.severity} />
            {c.anonymous && <AnonymityBadge />}
            <span className="ml-auto text-[11px] text-[var(--muted)] font-mono">{c.lastAction}</span>
          </div>
          <div className="text-[14px] text-[var(--ink)] font-medium leading-snug" style={{ textWrap:'pretty' }}>{c.title}</div>
          <div className="mt-2 flex items-center gap-3 text-[11.5px] text-[var(--muted)]">
            <span className="inline-flex items-center gap-1"><Icon name="user" size={12} /> {c.anonymous ? '— anonymous —' : (c.submittedBy || 'student')}</span>
            <span>·</span>
            <span className="inline-flex items-center gap-1"><Icon name="route" size={12} /> {c.routing.join(' → ')}</span>
            <span>·</span>
            <span className="inline-flex items-center gap-1"><Icon name="clock" size={12} /> {c.submitted.split(',')[0]}</span>
          </div>
        </div>
        <StatusPill status={c.status} />
      </div>
    </button>
  );
}

function ComplaintDetail({ c, detail, detailLoading, actionErr, actionBusy, onClose, onEscalate, onResolve, onMarkUnderReview, onDismiss }) {
  const [tab, setTab] = useState('overview');

  const reviews = detail?.reviews || [];
  const attachments = detail?.attachments || [];

  return (
    <div className="flex flex-col h-full">
      {/* Header */}
      <div className="hair-b p-5 sticky top-0 bg-[var(--paper)] z-10">
        <div className="flex items-start justify-between gap-3">
          <div className="min-w-0">
            <div className="flex flex-wrap items-center gap-2 mb-2">
              <MonoChip tone="navy">{c.id}</MonoChip>
              <StatusPill status={c.status} />
              <SeverityDots severity={c.severity} />
              {c.anonymous && <AnonymityBadge />}
            </div>
            <h2 className="font-serif text-[22px] leading-tight text-[var(--navy)]" style={{fontWeight:500, textWrap:'pretty'}}>{c.title}</h2>
            <div className="mt-1.5 text-[12px] text-[var(--muted)]">
              {c.anonymous ? '— anonymous submitter —' : (c.submittedBy || 'student')}
              {c.dept ? ` · ${c.dept}` : ''}
              {c.batch ? ` · ${c.batch}` : ''}
              {' · submitted '}<span className="font-mono">{c.submitted}</span>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-sm hover:bg-[var(--mist)]/40 flex items-center justify-center">
            <Icon name="x" size={16} />
          </button>
        </div>
        {/* Tabs */}
        <div className="mt-4 flex items-center gap-1 -mx-1">
          {['overview','timeline','evidence','routing','notes'].map(t => (
            <button key={t} onClick={()=>setTab(t)} className={`px-3 py-1.5 text-[12.5px] rounded-sm ${tab===t?'bg-[var(--sage-tint)] text-[var(--sage)] font-medium':'text-[var(--muted)] hover:bg-[var(--mist)]/40'}`}>
              {{overview:'Overview', timeline:'Timeline', evidence:'Evidence', routing:'Routing', notes:'Reviews'}[t]}
            </button>
          ))}
        </div>
      </div>

      {/* Tab content */}
      <div className="p-5 flex-1 space-y-5 overflow-y-auto">
        {detailLoading && (
          <div className="space-y-3 animate-pulse">
            <div className="h-4 bg-[var(--mist)] rounded-sm w-full" />
            <div className="h-4 bg-[var(--mist)] rounded-sm w-4/5" />
            <div className="h-4 bg-[var(--mist)] rounded-sm w-3/5" />
          </div>
        )}

        {!detailLoading && tab==='overview' && (
          <>
            {c.anonymous && (
              <AuditNote tone="red" icon="shield-alert">
                This case has Rank-{c.severity} anonymity protection. Identity is not visible without formal de-anonymization through Super Admin.
              </AuditNote>
            )}
            <section>
              <SectionLabel>Complaint body</SectionLabel>
              <p className="text-[13.5px] text-[var(--ink)] leading-relaxed" style={{ textWrap:'pretty' }}>
                {(detail?.body || c.body) || <span className="text-[var(--muted)] italic">No body text — submitter left blank or draft.</span>}
              </p>
            </section>
            {attachments.length > 0 && (
              <section>
                <SectionLabel>Evidence</SectionLabel>
                <div className="flex gap-2 flex-wrap">
                  {attachments.map(e => (
                    <div key={e.id} className="hair border rounded-sm p-2 flex items-center gap-2 text-[12px]">
                      <div className="w-8 h-8 rounded-sm flex items-center justify-center" style={{ background:'#EEEBE2' }}>
                        <Icon name={e.content_type?.includes('pdf')?'file-text':'image'} size={14} />
                      </div>
                      <span className="font-mono text-[11px] text-[var(--graphite)]">{e.original_filename}</span>
                    </div>
                  ))}
                </div>
              </section>
            )}
          </>
        )}

        {!detailLoading && tab==='timeline' && (
          <div>
            <SectionLabel>Case timeline</SectionLabel>
            {reviews.length === 0 && <EmptyState icon="clock" title="No actions yet" body="No admin review actions have been taken on this filing." />}
            <ol className="relative pl-6 space-y-4">
              <span className="absolute left-[9px] top-2 bottom-2 w-px bg-[var(--mist)]" />
              {reviews.map((r, i) => (
                <li key={r.id || i} className="relative">
                  <span className="absolute -left-[24px] top-0 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-mono"
                    style={{ background:'var(--sage)', color:'white' }}>{i+1}</span>
                  <div className="text-[13px] text-[var(--ink)] font-medium">{r.action}</div>
                  <div className="text-[11px] text-[var(--muted)] font-mono">{r.reviewer_role} · {new Date(r.reviewed_at).toLocaleString()}</div>
                  {r.public_note && <div className="text-[12.5px] text-[var(--graphite)] mt-1">{r.public_note}</div>}
                </li>
              ))}
            </ol>
          </div>
        )}

        {!detailLoading && tab==='evidence' && (
          <div>
            <SectionLabel>All evidence ({attachments.length})</SectionLabel>
            {attachments.length>0 ? (
              <div className="grid grid-cols-2 gap-3">
                {attachments.map(e => (
                  <div key={e.id} className="hair border rounded-sm p-3">
                    <div className="aspect-video rounded-sm mb-2 dot-grid" style={{ background:'#EEEBE2' }} />
                    <div className="font-mono text-[11px] text-[var(--graphite)]">{e.original_filename}</div>
                    <div className="text-[10px] text-[var(--muted)]">{e.content_type}</div>
                  </div>
                ))}
              </div>
            ) : <EmptyState icon="image-off" title="No evidence attached" body="Submitter did not attach photos, documents, or audio." />}
          </div>
        )}

        {!detailLoading && tab==='routing' && (
          <div>
            <SectionLabel>Routing chain</SectionLabel>
            <ol className="relative pl-6">
              <span className="absolute left-[9px] top-2 bottom-2 w-px bg-[var(--mist)]" />
              {['Submitted by student', 'Dept Head', ...(c.level>=1?['Dean']:[]), ...(c.level>=2?['VC Office']:[])].map((step, i) => {
                const reached = i <= c.routing.length;
                return (
                  <li key={i} className="relative pb-5 last:pb-0">
                    <span className="absolute -left-[24px] top-0 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-mono"
                      style={{ background: reached ? 'var(--sage)' : 'var(--mist)', color: reached ? 'white' : 'var(--muted)' }}>{i+1}</span>
                    <div className="text-[13px] text-[var(--ink)] font-medium">{step}</div>
                  </li>
                );
              })}
            </ol>
            <AuditNote tone="navy" icon="route" className="mt-3">
              Escalation level: <span className="font-mono">{c.level}</span>
            </AuditNote>
          </div>
        )}

        {!detailLoading && tab==='notes' && (
          <div>
            <SectionLabel>Admin review history</SectionLabel>
            {reviews.length === 0
              ? <EmptyState icon="clipboard" title="No reviews yet" body="No admin review actions recorded." />
              : (
                <div className="hair border rounded-sm divide-y" style={{ borderColor:'var(--mist)' }}>
                  {reviews.map((r, i) => (
                    <div key={r.id || i} className="p-3">
                      <div className="flex items-center gap-2 mb-1">
                        <MonoChip>{r.action}</MonoChip>
                        <span className="text-[11px] text-[var(--muted)]">{r.reviewer_role}</span>
                        <span className="ml-auto text-[10px] text-[var(--muted)] font-mono">{new Date(r.reviewed_at).toLocaleString()}</span>
                      </div>
                      {r.public_note && <p className="text-[12.5px] text-[var(--ink)]">{r.public_note}</p>}
                      {r.internal_note && <p className="text-[11.5px] text-[var(--muted)] mt-0.5 italic">{r.internal_note}</p>}
                    </div>
                  ))}
                </div>
              )
            }
          </div>
        )}
      </div>

      {/* Action bar */}
      {actionErr && (
        <div className="px-4 py-2 text-[12px]" style={{ background:'rgba(232,49,42,0.08)', color:'var(--red)' }}>{actionErr}</div>
      )}
      <div className="hair-t border-t p-4 sticky bottom-0 bg-[var(--paper)] flex flex-wrap items-center gap-2">
        <GhostButton size="sm" icon="eye" disabled={actionBusy} onClick={onMarkUnderReview}>Mark Under Review</GhostButton>
        <PrimaryButton size="sm" icon="check" mode="sage" disabled={actionBusy} onClick={onResolve}>Resolve</PrimaryButton>
        <PrimaryButton size="sm" icon="arrow-up-right" mode="red" disabled={actionBusy} onClick={onEscalate}>Escalate</PrimaryButton>
        <GhostButton size="sm" icon="x" danger disabled={actionBusy} onClick={onDismiss}>Reject</GhostButton>
      </div>
    </div>
  );
}

Object.assign(window, { UniComplaints });
</script>
<script type="text/babel">
// Routine Builder — three-step workflow ending in the weekly grid timetable
var { useState, useEffect, useCallback, useRef, useMemo } = React;
function UniRoutine({ onGo }) {
  const [step, setStep] = useState(2); // 0,1,2 -> Input / Generate / Review
  const [tab, setTab] = useState('courses');
  const [solving, setSolving] = useState(false);
  const [solved, setSolved] = useState(true);
  const [publishConfirm, setPublishConfirm] = useState(false);
  const [dept, setDept] = useState('SWE');
  const [semester, setSemester] = useState('Spring 2026');
  const D = window.AnchorData;

  return (
    <>
      <PageHeader
        title="Routine Builder"
        bn="ক্লাসের রুটিন প্রস্তুতকারক"
        description="Generate and publish the academic routine for your department. The solver respects hard constraints and minimises soft violations."
        actions={
          <>
            <div className="flex items-center gap-2 text-[12.5px] text-[var(--graphite)] mr-2">
              <span className="smallcaps text-[var(--muted)]">Department</span>
              <select value={dept} onChange={e=>setDept(e.target.value)} className="hair border rounded-sm bg-white px-2 py-1">
                <option value="SWE">Department of SWE</option>
                <option value="CSE">Department of CSE</option>
                <option value="EEE">Department of EEE</option>
              </select>
              <span className="smallcaps text-[var(--muted)] ml-3">Semester</span>
              <select value={semester} onChange={e=>setSemester(e.target.value)} className="hair border rounded-sm bg-white px-2 py-1">
                <option>Spring 2026</option>
                <option>Summer 2026</option>
              </select>
            </div>
            <StatusPill status={step===2 && solved ? 'Submitted' : 'Submitted'} />
            <MonoChip tone="navy">Draft</MonoChip>
          </>
        }
      />

      {/* Stepper */}
      <Card noPad className="mb-6">
        <div className="grid grid-cols-3">
          {[
            { i:0, name:'Input data', sub:'Courses, teachers, rooms, constraints', icon:'database' },
            { i:1, name:'Generate schedule', sub:'OR-Tools CP-SAT solver', icon:'cpu' },
            { i:2, name:'Review & publish', sub:'Weekly grid, conflicts, notify', icon:'calendar-check' },
          ].map((s, idx) => {
            const done = idx < step;
            const active = idx === step;
            return (
              <button key={s.i} onClick={()=>setStep(idx)} className={`p-5 text-left flex items-center gap-3 hair-r last:border-r-0 transition ${active?'bg-[var(--sage-tint)]/60':'hover:bg-[var(--mist)]/30'}`}>
                <div className="w-9 h-9 rounded-full flex items-center justify-center font-mono text-[12px]"
                  style={{ background: done?'var(--sage)':active?'var(--navy)':'var(--mist)', color: (done||active)?'white':'var(--graphite)' }}>
                  {done ? <Icon name="check" size={14} /> : idx+1}
                </div>
                <div className="min-w-0">
                  <div className={`text-[13.5px] font-medium ${active?'text-[var(--sage)]':'text-[var(--ink)]'}`}>{s.name}</div>
                  <div className="text-[11.5px] text-[var(--muted)] truncate">{s.sub}</div>
                </div>
              </button>
            );
          })}
        </div>
      </Card>

      {step===0 && <RoutineInput tab={tab} setTab={setTab} D={D} />}
      {step===1 && <RoutineGenerate solving={solving} solved={solved} onSolve={() => { setSolving(true); setTimeout(()=>{ setSolving(false); setSolved(true); setStep(2); }, 1800); }} />}
      {step===2 && <RoutineReview D={D} dept={dept} semester={semester} onPublish={()=>setPublishConfirm(true)} />}

      <ConfirmModal
        open={publishConfirm} onClose={()=>setPublishConfirm(false)} onConfirm={()=>{}}
        title={`Publish ${semester} routine?`}
        body="This will notify 12 teachers and 320 students via push notification + SMS. Once published, edits will require a new version and re-notification."
        confirmWord="PUBLISH" confirmLabel="Publish" tone="sage"
      />
    </>
  );
}

function RoutineInput({ tab, setTab, D }) {

            { v:'teachers', label:'Teachers', count:9 },
            { v:'rooms', label:'Rooms', count:14 },
            { v:'sections', label:'Sections', count:5 },
            { v:'slots', label:'Time Slots', count:8 },
          ].map(t => (
            <button key={t.v} onClick={()=>setTab(t.v)} className={`px-3 py-2.5 text-[13px] -mb-px hair-b border-b-2 ${tab===t.v?'border-[var(--sage)] text-[var(--sage)] font-medium':'border-transparent text-[var(--graphite)] hover:text-[var(--ink)]'}`}>
              {t.label} <span className="font-mono text-[10px] text-[var(--muted)] ml-1">{t.count}</span>

          <button className="text-[12px] text-[var(--sage)] hover:underline inline-flex items-center gap-1 mb-1">
            <Icon name="plus" size={12} /> Add
          </button>
        </div>

        {tab==='courses' && (
          <DataTable
            columns={[
              { key:'code', label:'Code', render:r=><MonoChip>{r.code}</MonoChip> },
              { key:'name', label:'Course name' },
              { key:'credits', label:'Cr.', align:'right' },
              { key:'type', label:'Type', render:r=><Tag tone={r.type==='Lab'?'gold':'sage'}>{r.type}</Tag> },
              { key:'sections', label:'Sections', align:'right' },
              { key:'teacher', label:'Assigned teacher' },
              { key:'', label:'', render:()=><Icon name="more-horizontal" size={14} className="text-[var(--muted)]" /> },
            ]}
            rows={D.courses}
          />
        )}
        {tab==='teachers' && (
          <DataTable
            columns={[
              { key:'name', label:'Teacher' },
              { key:'avail', label:'Availability' },
              { key:'max', label:'Max teaching hrs/wk', align:'right' },
              { key:'pref', label:'Preferences' },
            ]}
            rows={[
              { name:'Dr. Mahbub Alam', avail:'Sun–Wed · 09:30–17:00', max:'12', pref:'No 18:30 slots; prefers KT-504' },
              { name:'Dr. Tahmina Karim', avail:'Sun, Tue, Thu · all day', max:'10', pref:'Lab block before noon' },
              { name:'Dr. Farzana Rahman', avail:'Mon–Thu · 08:00–15:30', max:'14', pref:'2-day teaching window' },
              { name:'Dr. Imran Chowdhury', avail:'Sun, Mon, Wed · 11:00–18:30', max:'10', pref:'No back-to-back 3-hour blocks' },
            ]}
          />
        )}
        {tab==='rooms' && (
          <DataTable
            columns={[
              { key:'room', label:'Room', render:r=><MonoChip>{r.room}</MonoChip> },
              { key:'type', label:'Type', render:r=><Tag tone={r.type==='Lab'?'gold':'sage'}>{r.type}</Tag> },
              { key:'cap', label:'Capacity', align:'right' },
              { key:'building', label:'Building' },
            ]}
            rows={[
              { room:'KT-504', type:'Theory', cap:42, building:'Knowledge Tower' },
              { room:'KT-308', type:'Lab',    cap:30, building:'Knowledge Tower' },
              { room:'KT-712', type:'Theory', cap:38, building:'Knowledge Tower' },
              { room:'KT-401', type:'Theory', cap:35, building:'Knowledge Tower' },
              { room:'AB1-201', type:'Theory',cap:45, building:'Academic Building 1' },
              { room:'AB2-105', type:'Lab',   cap:28, building:'Academic Building 2' },
            ]}
          />
        )}
        {tab==='sections' && (
          <DataTable
            columns={[
              { key:'sec', label:'Section', render:r=><MonoChip>{r.sec}</MonoChip> },
              { key:'batch', label:'Batch' },
              { key:'cap', label:'Enrollment', align:'right' },
            ]}
            rows={[
              { sec:'53-A', batch:'53', cap:38 },
              { sec:'53-B', batch:'53', cap:36 },
              { sec:'54-A', batch:'54', cap:42 },
              { sec:'54-B', batch:'54', cap:40 },
              { sec:'55-A', batch:'55', cap:34 },
            ]}
          />
        )}
        {tab==='slots' && (
          <div className="p-5 grid grid-cols-4 gap-2">
            {D.slots.map((s,i) => (
              <div key={s} className="hair border rounded-sm p-3 text-center">
                <div className="font-mono text-[14px] text-[var(--ink)]">{s}</div>
                <div className="text-[10px] text-[var(--muted)] mt-0.5">Slot {i+1} · 90 min</div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* Constraints panel */}
      <div>
        <Card noPad>
          <div className="p-4 hair-b flex items-center gap-2">
            <Icon name="sliders-horizontal" size={14} />
            <span className="font-medium text-[13.5px]">Constraints</span>
          </div>
          <div className="p-4 space-y-4">
            <div>
              <div className="smallcaps text-[var(--muted)] mb-2">Hard · cannot violate</div>
              {[
                'No teacher in two rooms at once',
                'No section in two classes at once',
                'No room double-booked',
                'Lab courses → Lab-type rooms only',
                'Respect teacher availability windows',
              ].map(c => (
                <div key={c} className="flex items-center gap-2 py-1 text-[12.5px]">
                  <Icon name="check-circle" size={12} style={{ color:'var(--sage)' }} />
                  <span className="text-[var(--graphite)]">{c}</span>
                </div>
              ))}
            </div>
            <div className="hair-t border-t pt-3">
              <div className="smallcaps text-[var(--muted)] mb-2">Soft · weighted</div>
              {[
                { name:'Minimise teacher gaps', val:80 },
                { name:'Cluster lab sessions', val:60 },
                { name:'Prefer morning blocks', val:40 },
                { name:'Spread sections across week', val:55 },
              ].map(s => (
                <div key={s.name} className="py-2">
                  <div className="flex items-center justify-between text-[12.5px] mb-1">

function RoutineGenerate({ solving, solved, onSolve }) {
  return (
    <Card className="p-10 text-center flex flex-col items-center gap-4">
      <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{ background: solving?'#F2E8D2':'#E8EFEA' }}>
        <Icon name={solving?'loader':'cpu'} size={28} style={{ color: solving?'var(--gold)':'var(--sage)' }} className={solving?'animate-spin':''} />
      </div>
      <div>
        <h3 className="font-serif text-[26px] text-[var(--navy)]" style={{fontWeight:500}}>
          {solving?'Solving…':'Generate schedule'}
        </h3>
        <p className="mt-2 text-[13px] text-[var(--graphite)] max-w-[60ch]">
          {solving
            ? 'CP-SAT solver is exploring the feasible region · 4 courses · 5 sections · 6 rooms · 8 time slots'
            : 'Click Generate to run the Google OR-Tools CP-SAT solver against your inputs. The result will surface in step 3 with conflicts and feasibility score.'}
        </p>
      </div>
      <PrimaryButton mode="sage" icon="play" onClick={onSolve} disabled={solving}>
        {solving?'Solving…':'Generate schedule'}
      </PrimaryButton>
      <div className="text-[11px] text-[var(--muted)] flex items-center gap-2 mt-2">
        <Icon name="cpu" size={11} /> <span>Google OR-Tools · CP-SAT solver · ~1.4s typical</span>
      </div>
      {solving && (
        <div className="w-full max-w-[480px] mt-4 text-left">
          <div className="text-[11px] text-[var(--muted)] mb-1 flex justify-between"><span>Constraint propagation</span><span className="font-mono">14,221 / 18,000</span></div>
          <div className="h-1.5 bg-[var(--mist)] rounded-sm overflow-hidden">
            <div className="h-full bg-[var(--sage)]" style={{ width:'78%', transition:'width 1.2s ease' }} />
          </div>
        </div>
      )}
    </Card>
  );
}

function RoutineReview({ D, dept, semester, onPublish }) {
  const [hovered, setHovered] = useState(null);
  const [editing, setEditing] = useState(null);
  const [publishing, setPublishing] = useState(false);
  const [publishDone, setPublishDone] = useState(false);
  const [publishError, setPublishError] = useState('');
  const [existingRoutines, setExistingRoutines] = useState([]);

  useEffect(() => {
    AnchorAPI.apiGet('/v1/routines?page=1')
      .then(data => setExistingRoutines(data))
      .catch(() => {});
  }, [publishDone]);

  async function handlePublishToAPI() {
    setPublishing(true); setPublishError('');
    try {
      const slots = D.timetable.map(t => ({ day: D.days[t.d], time: D.slots[t.s], course: t.code, room: t.room, teacher: t.teacher, section: t.sec }));
      const routine = await AnchorAPI.apiPostAuth('/v1/routines', {
        title: `${dept} ${semester} Routine`,
        department: dept,
        semester,
        academic_year: '2025-2026',
        slots,
      });
      await AnchorAPI.apiPostAuth(`/v1/routines/${routine.id}/publish`, {});
      setPublishDone(true);
    } catch (err) {
      setPublishError(err.message || 'Publish failed. Try again.');
    } finally { setPublishing(false); }
  }
  return (
    <div className="grid gap-5" style={{ gridTemplateColumns:'1fr 280px' }}>
      <Card noPad>
        <div className="p-4 hair-b flex items-center justify-between">
          <div className="flex items-center gap-3">
            <Icon name="calendar" size={14} />
            <span className="font-medium text-[13.5px]">Spring 2026 · Department of SWE</span>
            <span className="text-[12px] text-[var(--muted)]">Drag any cell to swap. Conflicts are outlined in red.</span>
          </div>
          <div className="flex items-center gap-2">
            <GhostButton size="sm" icon="rotate-ccw">Re-generate</GhostButton>
            <GhostButton size="sm" icon="download">Export</GhostButton>
          </div>
        </div>

        <div className="p-4">
          <div className="grid" style={{ gridTemplateColumns: '70px repeat(5, 1fr)', gap: '4px' }}>
            <div />
            {D.days.map(d => (
              <div key={d} className="smallcaps text-center text-[var(--muted)] pb-2">{d}</div>
            ))}
            {D.slots.map((slot, si) => (
              <React.Fragment key={slot}>
                <div className="text-[11px] text-[var(--muted)] font-mono flex items-start pt-2">{slot}</div>
                {D.days.map((d, di) => {
                  const entry = D.timetable.find(t => t.d===di && t.s===si);
                  if (!entry) {
                    return <div key={di} className="hair border border-dashed rounded-sm min-h-[58px]" style={{ borderColor:'#EDEAE0', background:'#FBF9F3' }} />;
                  }
                  const color = D.sectionColors[entry.sec] || '#4A6B5C';
                  return (
                    <button key={di} onClick={()=>setEditing(entry)} className={`tt-cell text-left rounded-sm p-2 min-h-[58px] relative hair border`}
                      style={{ borderColor: entry.conflict?'#E8312A':color+'33', background: color+'12', boxShadow: entry.conflict?'inset 0 0 0 2px #E8312A':'none' }}>
                      <div className="flex items-center gap-1.5">
                        <span className="w-1 h-3 rounded-full" style={{ background: color }} />
                        <span className="font-mono text-[11px] text-[var(--ink)] font-medium">{entry.code}</span>
                      </div>
                      <div className="mt-1 text-[11px] text-[var(--graphite)] leading-tight">
                        {entry.sec} · {entry.room}
                      </div>
                      <div className="text-[10px] text-[var(--muted)] truncate">{entry.teacher}</div>
                      {entry.conflict && (

function UniGeofence({ onGo }) {
  const [vertices, setVertices] = useState([]);
  const [drawMode, setDrawMode] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [recentAlerts, setRecentAlerts] = useState([]);
  const [geoInfo, setGeoInfo] = useState(null);

  useEffect(() => {
    AnchorAPI.apiGet('/v1/admin/geofence')
      .then(r => {
        if (Array.isArray(r.vertices) && r.vertices.length >= 3) {
          setVertices(r.vertices);
          setGeoInfo({ updated_at: r.updated_at, vertex_count: r.vertices.length });
        }
      }).catch(() => {});
    AnchorAPI.apiGet('/v1/admin/alerts?state=active&limit=5')
      .then(r => setRecentAlerts(r.items ?? []))
      .catch(() => {});
  }, []);

  const handleSvgClick = (e) => {
    if (!drawMode) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = Math.round(((e.clientX - rect.left) / rect.width) * 400);
    const y = Math.round(((e.clientY - rect.top) / rect.height) * 200);
    setVertices(v => [...v, [x, y]]);
  };

  const handleSave = async () => {
    if (vertices.length < 3) return;
    setSaving(true);
    try {
      await AnchorAPI.apiPost('/v1/admin/geofence', { vertices });
      setSaved(true);
      setGeoInfo({ updated_at: new Date().toISOString(), vertex_count: vertices.length });
      setTimeout(() => setSaved(false), 3000);
    } catch (e) {
      console.error('[Geofence] Save failed:', e);
    } finally {
      setSaving(false);
    }
  };

  const polyPoints = vertices.map(([x, y]) => `${x},${y}`).join(' ');

  return (
    <>
      <PageHeader
        title="Campus geofence"
        bn="ক্যাম্পাস সীমানা"
        description="Draw your university's safety boundary. Active alerts inside this zone are routed to the Super Admin operations team."
        actions={
          <>
            <GhostButton icon={drawMode ? 'pencil-off' : 'pencil'} size="sm" onClick={() => setDrawMode(m => !m)}>
              {drawMode ? 'Done drawing' : 'Draw boundary'}
            </GhostButton>
            {vertices.length > 0 && (
              <GhostButton icon="undo-2" size="sm" onClick={() => setVertices(v => v.slice(0, -1))}>Undo</GhostButton>
            )}

              icon="save"
              mode="sage"
              size="sm"
              onClick={handleSave}
              disabled={saving || vertices.length < 3}

            </PrimaryButton>
          </>
        }
      />

      <AuditNote tone="navy" icon="shield-check">
        Campus alerts are operated by the AiVion Trust &amp; Safety team. Your role is to maintain the geofence boundary — alerts that fire inside this area are routed to platform operators in real time.

        <Card noPad>
          <div className="p-4 hair-b flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="map-pin" size={14} />
              <span className="font-medium text-[13.5px]">Boundary editor</span>
              {drawMode
                ? <span className="text-[12px]" style={{ color: 'var(--sage)' }}>Click canvas to place vertices</span>
                : <span className="text-[12px] text-[var(--muted)]">Click "Draw boundary" to start placing vertices</span>
              }
            </div>
            <GhostButton size="sm" icon="trash-2" onClick={() => setVertices([])}>Clear</GhostButton>
          </div>

          <div style={{ padding: '16px' }}>
            <svg
              viewBox="0 0 400 200"
              style={{
                width: '100%', height: 'auto', background: '#F5F5F2',
                borderRadius: 4, cursor: drawMode ? 'crosshair' : 'default',
                border: '1px solid var(--hair)',
              }}
              onClick={handleSvgClick}
            >
              <defs>
                <pattern id="gfgrid" width="40" height="40" patternUnits="userSpaceOnUse">
                  <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E8E8E4" strokeWidth="0.5" />
                </pattern>
              </defs>
              <rect width="400" height="200" fill="url(#gfgrid)" />

                <span className="text-[var(--muted)]">Vertices</span>
                <span className="font-mono">{vertices.length}</span>

              {geoInfo?.updated_at && (
                <div className="flex items-center justify-between text-[12.5px]">

            {recentAlerts.length === 0 ? (
              <div className="text-[12px] text-[var(--muted)] text-center py-2">No active alerts</div>

              </div>

        </div>
      </div>
    </>
  );
}

// ---- Classroom reports ----
function UniClassrooms({ onGo }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  useEffect(() => {
    AnchorAPI.apiGet('/v1/classroom-reports')
      .then(data => {
        const map = {};
        (Array.isArray(data) ? data : []).forEach(r => {
          if (!map[r.classroom_ref]) map[r.classroom_ref] = { room: r.classroom_ref, issues: [], count: 0 };
          map[r.classroom_ref].issues.push(r.issue_type);
          map[r.classroom_ref].count += r.count;
        });
        setRows(Object.values(map).sort((a, b) => b.count - a.count));
        setLoading(false);
      })
      .catch(err => { setError(err.message || 'Could not load classroom reports.'); setLoading(false); });
  }, []);

  return (
    <>
      <PageHeader
        title="Classroom reports"
        description="Sorted by most-reported classroom. Bulk-resolve and schedule maintenance from this view."
        actions={
          <>
            <GhostButton icon="wrench" size="sm">Schedule maintenance</GhostButton>
            <GhostButton icon="check-square" size="sm">Bulk resolve</GhostButton>
          </>
        }
      />

      {error && (
        <div className="mb-4 px-3 py-2 rounded-sm text-[12.5px]" style={{ background:'rgba(232,49,42,0.08)', color:'var(--red)', border:'1px solid rgba(232,49,42,0.2)' }}>
          {error}
        </div>
      )}

      {loading && (
        <Card>
          <div className="space-y-3 animate-pulse">
            {[1,2,3].map(i => <div key={i} className="h-4 bg-[var(--mist)] rounded-sm" />)}
          </div>
        </Card>
      )}

      {!loading && rows.length === 0 && !error && (
        <Card><EmptyState icon="clipboard" title="No classroom reports" body="No students have submitted classroom condition reports yet." /></Card>
      )}

      {!loading && rows.length > 0 && (
        <Card noPad>
          <DataTable
            columns={[
              { key:'room', label:'Room', render:r=><MonoChip tone="navy">{r.room}</MonoChip> },
              { key:'count', label:'Reports', align:'right', render:r=><span className="font-mono text-[var(--ink)]">{r.count}</span> },
              { key:'issues', label:'Issues reported', render:r=><div className="flex flex-wrap gap-1">{r.issues.map(i=><Tag key={i} tone="mist">{i}</Tag>)}</div> },
            ]}
            rows={rows}
            onRowClick={()=>{}}
          />
        </Card>
      )}
    </>
  );
}

// ---- Step-up modal (uni admin) ----
function UniStepUpModal({ onDone, onCancel }) {
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  async function submit() {
    setLoading(true); setErr('');
    try {
      const data = await AnchorAPI.apiPostAuth('/auth/stepup', { password: pw });
      onDone(data.stepup_token);
    } catch (e) { setErr(e.message || 'Authentication failed'); }
    setLoading(false);
  }
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(11,29,53,0.55)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ background:'var(--paper)', borderRadius:12, padding:'28px 24px', width:340, boxShadow:'0 8px 32px rgba(0,0,0,0.18)' }}>
        <div style={{ fontWeight:700, fontSize:15, color:'var(--navy)', marginBottom:6 }}>Confirm your identity</div>
        <div style={{ fontSize:13, color:'var(--graphite)', marginBottom:16 }}>This action requires your password.</div>
        <input type="password" value={pw} onChange={e => setPw(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && submit()} placeholder="Password"
          style={{ width:'100%', padding:'10px 12px', borderRadius:8, fontSize:13, border:'1.5px solid var(--mist)', marginBottom:10, boxSizing:'border-box' }} autoFocus />
        {err && <div style={{ color:'var(--ember)', fontSize:12, marginBottom:8 }}>{err}</div>}
        <div style={{ display:'flex', gap:8 }}>
          <GhostButton size="sm" onClick={onCancel} style={{ flex:1 }}>Cancel</GhostButton>
          <PrimaryButton size="sm" mode="sage" onClick={submit} disabled={loading || !pw} style={{ flex:1 }}>
            {loading ? 'Verifying…' : 'Confirm'}
          </PrimaryButton>
        </div>
      </div>
    </div>
  );
}

// ---- Verification feed (university admin) ----
function UniFeedCard({ v, onDefer, onConfirm, onMarkFake, onDetail, busy, isDone, msg }) {
  const sc = v.signal_counts || {};
  const corrob = sc.corroborate ?? 0;
  const chall = sc.challenge ?? 0;

function UniVerificationFeed() {
  const TAB_API = { 'Pending': 'flagged', 'Confirmation': 'confirmation', 'Pre-publish': 'pre_publish' };
  const TABS = ['Pending', 'Confirmation', 'Pre-publish'];
  const [tab, setTab] = useState('Pending');
  const [posts, setPosts] = useState([]);
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [actionMsg, setActionMsg] = useState({});
  const [actionLoading, setActionLoading] = useState({});
  const [detail, setDetail] = useState(null);
  const [stepUp, setStepUp] = useState(null);

  function loadPosts(activeTab) {
    setLoading(true); setError('');
    const apiTab = TAB_API[activeTab] || 'flagged';
    Promise.all([
      AnchorAPI.apiGet(`/v1/feed/admin/queue?tab=${apiTab}&page=1&page_size=20`),
      AnchorAPI.apiGet('/v1/feed/admin/stats'),
    ]).then(([queue, s]) => {
      setPosts(Array.isArray(queue) ? queue : []);
      setStats(s);
      setLoading(false);
    }).catch(err => { setError(err.message || 'Could not load feed queue.'); setLoading(false); });
  }

  useEffect(() => { loadPosts(tab); }, [tab]);

  async function handleDefer(postId) {
    setActionLoading(a => ({...a, [postId]: true})); setActionMsg(m => ({...m, [postId]: ''}));
    try {
      await AnchorAPI.apiPostAuth(`/v1/feed/admin/${postId}/defer`, { internal_note: 'Deferred by admin.' });
      setActionMsg(m => ({...m, [postId]: 'deferred'}));
      setTimeout(() => loadPosts(tab), 400);
    } catch (err) {
      setActionMsg(m => ({...m, [postId]: err.message || 'Failed'}));
    } finally { setActionLoading(a => ({...a, [postId]: false})); }
  }

  function handleConfirm(postId) { setStepUp({ postId, action: 'confirm' }); }
  function handleMarkFake(postId) { setStepUp({ postId, action: 'fake' }); }

  async function doActionWithToken(postId, action, stepupToken) {
    setActionLoading(a => ({...a, [postId]: true})); setActionMsg(m => ({...m, [postId]: ''}));
    try {
      const path = action === 'confirm' ? 'confirm' : 'mark-fake';
      const body = action === 'confirm'
        ? { internal_note: 'Confirmed by admin.' }
        : { public_note: 'Post marked as inaccurate by university admin after review.', internal_note: 'Marked fake by admin.' };
      const r = await fetch(`http://localhost:8000/v1/feed/admin/${postId}/${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + stepupToken },
        body: JSON.stringify(body),
      });
      if (!r.ok) { const d = await r.json(); throw new Error(d.detail || 'Action failed'); }
      setActionMsg(m => ({...m, [postId]: action === 'confirm' ? 'confirmed' : 'marked fake'}));
      setTimeout(() => loadPosts(tab), 400);
    } catch (err) {
      setActionMsg(m => ({...m, [postId]: err.message || 'Failed'}));
    } finally { setActionLoading(a => ({...a, [postId]: false})); }
  }

  async function openDetail(postId) {
    setDetail({ _loading: true });
    try {
      const d = await AnchorAPI.apiGet(`/v1/feed/admin/${postId}`);
      setDetail(d);
    } catch (err) {
      setDetail({ _error: err.message || 'Could not load post.' });
    }
  }

  const DONE = new Set(['deferred', 'confirmed', 'marked fake']);

  return (
    <>
      {stepUp && (
        <UniStepUpModal
          onDone={token => { setStepUp(null); doActionWithToken(stepUp.postId, stepUp.action, token); }}
          onCancel={() => setStepUp(null)}
        />
      )}
      <PageHeader
        title="Verification feed"
        bn="যাচাইকরণ ফিড"
        description="Moderate posts from your tenant before they go platform-public. Confirm accurate reports, send back for more context, or mark as inaccurate."
        actions={stats && (
          <div className="flex items-center gap-2">
            <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-sm text-[12px] font-medium"
              style={{ background:'rgba(196,69,54,0.10)', color:'var(--ember)' }}>
              <Icon name="flag" size={11} />{stats.flagged ?? '—'} flagged
            </span>
            <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-sm text-[12px] font-medium"
              style={{ background:'rgba(74,107,92,0.10)', color:'var(--sage)' }}>
              <Icon name="check-circle" size={11} />{stats.confirmed ?? '—'} confirmed
            </span>
            <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-sm text-[12px] font-medium"
              style={{ background:'var(--mist)', color:'var(--graphite)' }}>
              <Icon name="layers" size={11} />{stats.total ?? '—'} total
            </span>
          </div>
        )}
      />

      <AuditNote tone="navy" icon="shield-check" className="mb-4">
        Approving and marking-fake require step-up authentication — you'll be prompted for your password. Send-back does not.
      </AuditNote>

      <Card noPad>
        <div className="p-4 hair-b flex items-center gap-1">
          {TABS.map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={`px-3 py-1.5 text-[13px] rounded-sm ${tab===t?'bg-[var(--sage)] text-white':'hair border text-[var(--graphite)]'}`}>
              {t}
            </button>
          ))}
        </div>

        {loading && (
          <div className="p-4 space-y-3">
            {[1,2,3].map(i => (
              <div key={i} className="hair border rounded-sm p-4 animate-pulse space-y-2">
                <div className="flex gap-2"><div className="h-5 w-20 bg-[var(--mist)] rounded-sm" /><div className="h-5 w-16 bg-[var(--mist)] rounded-sm" /></div>
                <div className="h-4 bg-[var(--mist)] rounded-sm w-3/4" />
                <div className="flex gap-2"><div className="h-5 w-24 bg-[var(--mist)] rounded-sm" /><div className="h-5 w-24 bg-[var(--mist)] rounded-sm" /></div>
              </div>
            ))}
          </div>
        )}
        {error && (
          <div className="p-4 text-[13px]" style={{color:'var(--red)'}}>
            {error} — <button className="underline" onClick={() => loadPosts(tab)}>Retry</button>
          </div>
        )}
        {!loading && !error && posts.length === 0 && (
          <div className="p-8 text-center text-[13px] text-[var(--muted)]">No posts in this queue.</div>
        )}
        {!loading && !error && posts.length > 0 && (
          <div className="p-4 space-y-3">
            {posts.map(v => (
              <UniFeedCard
                key={v.id}
                v={v}
                onDefer={() => handleDefer(v.id)}
                onConfirm={() => handleConfirm(v.id)}
                onMarkFake={() => handleMarkFake(v.id)}
                onDetail={() => openDetail(v.id)}
                busy={actionLoading[v.id] || false}
                isDone={DONE.has(actionMsg[v.id])}
                msg={actionMsg[v.id] || ''}
              />
            ))}
          </div>
        )}
      </Card>

      <SlideOver open={!!detail} onClose={() => setDetail(null)} width={580}>
        {detail && detail._loading && (
          <div className="p-5 text-[13px] text-[var(--muted)]">Loading…</div>
        )}
        {detail && detail._error && (
          <div className="p-5 text-[13px]" style={{color:'var(--red)'}}>{detail._error}</div>
        )}
        {detail && !detail._loading && !detail._error && (
          <div className="p-5 space-y-4">
            <div className="flex items-center justify-between">
              <SectionLabel className="mb-0">Post detail</SectionLabel>
              <button onClick={() => setDetail(null)} className="w-7 h-7 rounded-sm hover:bg-[var(--mist)]/40 flex items-center justify-center">
                <Icon name="x" size={14} />
              </button>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <MonoChip tone="navy">#{detail.post_number}</MonoChip>
              <Tag tone="navy">{detail.scope}</Tag>
              <Tag tone="mist">{detail.category}</Tag>
              {detail.admin_confirmed && <Tag tone="sage">Confirmed</Tag>}
              <span className="ml-auto font-mono text-[11px] text-[var(--muted)]">{new Date(detail.created_at).toLocaleString()}</span>
            </div>
            <h3 className="font-serif text-[20px] text-[var(--navy)]" style={{fontWeight:500, textWrap:'pretty'}}>{detail.title}</h3>
            <div className="hair border rounded-sm p-3 bg-[#FDFBF7] text-[13px] leading-relaxed whitespace-pre-wrap">
              {detail.body || <span className="text-[var(--muted)] italic">No body text.</span>}
            </div>

            {detail.signal_counts && (
              <div className="flex items-center gap-2 flex-wrap">
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-[11.5px] font-medium" style={{ background:'rgba(74,107,92,0.10)', color:'var(--sage)' }}>
                  <Icon name="check-circle" size={11} />{detail.signal_counts.corroborate} corroborate
                </span>
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-[11.5px] font-medium" style={{ background:'rgba(196,69,54,0.10)', color:'var(--ember)' }}>
                  <Icon name="x-circle" size={11} />{detail.signal_counts.challenge} challenge
                </span>
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-[11.5px] font-medium" style={{ background:'rgba(184,137,58,0.12)', color:'var(--gold)' }}>
                  <Icon name="flag" size={11} />{detail.signal_counts.flags} flags
                </span>
              </div>
            )}

            {detail.flags && detail.flags.length > 0 && (
              <>
                <SectionLabel>Flags</SectionLabel>
                <div className="space-y-1.5">
                  {detail.flags.map((f, i) => (
                    <div key={i} className="hair border rounded-sm p-2.5 text-[12px] flex items-center gap-2">
                      <Icon name="flag" size={12} className="text-[var(--gold)]" />
                      <span className="font-mono text-[var(--muted)]">{f.flag_reason}</span>
                      {f.note && <span className="text-[var(--ink)]">— {f.note}</span>}
                      <span className="ml-auto font-mono text-[10px] text-[var(--muted)]">{new Date(f.created_at).toLocaleDateString()}</span>
                    </div>
                  ))}
                </div>
              </>
            )}

            {detail.moderation_history && detail.moderation_history.length > 0 && (
              <>
                <SectionLabel>Moderation history</SectionLabel>
                <div className="space-y-2">
                  {detail.moderation_history.map((m, i) => (
                    <div key={i} className="hair border rounded-sm p-2.5 text-[12px]">
                      <div className="flex items-center gap-2">
                        <MonoChip>{m.action}</MonoChip>
                        <span className="text-[var(--muted)] font-mono text-[10px]">{new Date(m.created_at).toLocaleString()}</span>
                      </div>
                      {m.public_note && <p className="mt-1 text-[var(--ink)]">{m.public_note}</p>}
                      {m.internal_note && <p className="mt-0.5 text-[var(--muted)] italic text-[11px]">{m.internal_note}</p>}
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}
      </SlideOver>
    </>
  );
}

function Sparkline({ values, color='var(--ember)' }) {
  const w = 60, h = 24, max = Math.max(...values), min = Math.min(...values);
  const pts = values.map((v, i) => {
    const x = (i/(values.length-1))*w;
    const y = h - ((v-min)/(max-min||1))*(h-4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={w} height={h}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

// ---- Step-up modal (super admin) ----
function AdminStepUpModal({ onDone, onCancel }) {
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  async function submit() {
    setLoading(true); setErr('');
    try {
      const data = await AnchorAPI.apiPostAuth('/auth/stepup', { password: pw });
      onDone(data.stepup_token);
    } catch (e) { setErr(e.message || 'Authentication failed'); }
    setLoading(false);
  }
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(11,29,53,0.55)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ background:'var(--paper)', borderRadius:12, padding:'28px 24px', width:340, boxShadow:'0 8px 32px rgba(0,0,0,0.18)' }}>
        <div style={{ fontWeight:700, fontSize:15, color:'var(--navy)', marginBottom:6 }}>Confirm your identity</div>
        <div style={{ fontSize:13, color:'var(--graphite)', marginBottom:16 }}>This action requires your password.</div>
        <input type="password" value={pw} onChange={e => setPw(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && submit()} placeholder="Password"
          style={{ width:'100%', padding:'10px 12px', borderRadius:8, fontSize:13, border:'1.5px solid var(--mist)', marginBottom:10, boxSizing:'border-box' }} autoFocus />
        {err && <div style={{ color:'var(--ember)', fontSize:12, marginBottom:8 }}>{err}</div>}
        <div style={{ display:'flex', gap:8 }}>
          <GhostButton size="sm" onClick={onCancel} style={{ flex:1 }}>Cancel</GhostButton>
          <PrimaryButton size="sm" mode="ember" onClick={submit} disabled={loading || !pw} style={{ flex:1 }}>
            {loading ? 'Verifying…' : 'Confirm'}
          </PrimaryButton>
        </div>
      </div>
    </div>
  );
}

function SuperVerificationFeed() {
  const TAB_API = { 'Pending': 'flagged', 'Confirmation': 'confirmation', 'Pre-publish': 'pre_publish' };
  const TABS = ['Pending', 'Confirmation', 'Pre-publish'];
  const [tab, setTab] = useState('Pending');
  const [posts, setPosts] = useState([]);
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [actionMsg, setActionMsg] = useState({});
  const [actionLoading, setActionLoading] = useState({});
  const [stepUp, setStepUp] = useState(null); // { postId }

  function loadPosts(activeTab) {
    setLoading(true); setError('');
    const apiTab = TAB_API[activeTab] || 'flagged';
    Promise.all([
      AnchorAPI.apiGet(`/v1/feed/admin/queue?tab=${apiTab}&page=1&page_size=20`),
      AnchorAPI.apiGet('/v1/feed/admin/stats'),
    ]).then(([queue, s]) => {
      setPosts(Array.isArray(queue) ? queue : []);
      setStats(s);
      setLoading(false);
    }).catch(err => { setError(err.message || 'Could not load feed queue.'); setLoading(false); });
  }

  useEffect(() => { loadPosts(tab); }, [tab]);

  async function handleDefer(postId) {
    setActionLoading(a => ({...a, [postId]: true})); setActionMsg(m => ({...m, [postId]: ''}));
    try {
      await AnchorAPI.apiPostAuth(`/v1/feed/admin/${postId}/defer`, { internal_note: 'Deferred by super admin.' });
      setActionMsg(m => ({...m, [postId]: 'deferred'}));
      loadPosts(tab);
    } catch (err) {
      setActionMsg(m => ({...m, [postId]: err.message || 'Failed'}));
    } finally { setActionLoading(a => ({...a, [postId]: false})); }
  }

  function handleConfirm(postId) {
    setStepUp({ postId });
  }

  async function doConfirmWithToken(postId, stepupToken) {
    setStepUp(null);
    setActionLoading(a => ({...a, [postId]: true})); setActionMsg(m => ({...m, [postId]: ''}));
    try {
      const res = await fetch(`http://localhost:8000/v1/feed/admin/${postId}/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${stepupToken}` },
        body: JSON.stringify({ internal_note: 'Confirmed by super admin.' }),
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || `Error ${res.status}`); }
      setActionMsg(m => ({...m, [postId]: 'confirmed'}));
      loadPosts(tab);
    } catch (err) {
      setActionMsg(m => ({...m, [postId]: err.message || 'Confirm failed'}));
    } finally { setActionLoading(a => ({...a, [postId]: false})); }
  }

  return (
    <>
      {stepUp && (
        <AdminStepUpModal
          onDone={token => doConfirmWithToken(stepUp.postId, token)}
          onCancel={() => setStepUp(null)}
        />
      )}
      <PageHeader
        title="Verification feed"
        description="Posts escalated by university admins for platform-public visibility. Approve, deny, or send back."
        actions={stats && (
          <div className="flex items-center gap-2">
            <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-sm text-[12px] font-medium"
              style={{ background:'rgba(196,69,54,0.10)', color:'var(--ember)' }}>
              <Icon name="flag" size={11} />{stats.flagged ?? '—'} flagged
            </span>
            <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-sm text-[12px] font-medium"
              style={{ background:'rgba(74,107,92,0.10)', color:'var(--sage)' }}>
              <Icon name="check-circle" size={11} />{stats.confirmed ?? '—'} confirmed
            </span>
            <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-sm text-[12px] font-medium"
              style={{ background:'var(--mist)', color:'var(--graphite)' }}>
              <Icon name="layers" size={11} />{stats.total ?? '—'} total
            </span>
          </div>
        )}
      />

      <Card noPad>
        <div className="p-4 hair-b flex items-center gap-1">
          {TABS.map(t => (
            <button key={t} onClick={() => setTab(t)} className={`px-3 py-1.5 text-[13px] rounded-sm ${tab===t?'bg-[var(--navy)] text-white':'hair border text-[var(--graphite)]'}`}>{t}</button>
          ))}
        </div>

        {loading && (
          <div className="p-4 space-y-3">
            {[1,2,3].map(i => (
              <div key={i} className="hair border rounded-sm p-4 animate-pulse space-y-2">
                <div className="flex gap-2"><div className="h-5 w-20 bg-[var(--mist)] rounded-sm" /><div className="h-5 w-16 bg-[var(--mist)] rounded-sm" /></div>
                <div className="h-4 bg-[var(--mist)] rounded-sm w-3/4" />
                <div className="flex gap-2"><div className="h-5 w-24 bg-[var(--mist)] rounded-sm" /><div className="h-5 w-24 bg-[var(--mist)] rounded-sm" /></div>
              </div>
            ))}
          </div>
        )}
        {error && (
          <div className="p-4 text-[13px]" style={{color:'var(--red)'}}>
            {error} — <button className="underline" onClick={() => loadPosts(tab)}>Retry</button>
          </div>
        )}
        {!loading && !error && posts.length === 0 && (
          <div className="p-8 text-center text-[13px] text-[var(--muted)]">No posts in this queue.</div>
        )}

        {!loading && !error && posts.length > 0 && (
          <div className="p-4 space-y-3">
            {posts.map(v => (
              <FeedPostCard
                key={v.id}
                v={v}
                onDefer={() => handleDefer(v.id)}
                onConfirm={() => handleConfirm(v.id)}
                busy={actionLoading[v.id] || false}
                isDone={(actionMsg[v.id] === 'deferred' || actionMsg[v.id] === 'confirmed')}
                msg={actionMsg[v.id] || ''}
              />
            ))}
          </div>
        )}
      </Card>
    </>
  );
}

// ---- SUPER ADMIN · Campus Alerts Console ----

function _fmtElapsed(createdAt, now) {
  const secs = Math.max(0, Math.floor((now - new Date(createdAt).getTime()) / 1000));
  const h = String(Math.floor(secs / 3600)).padStart(2, '0');
  const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function _fmtLocation(lat, lng) {
  return (lat != null && lng != null) ? `${lat.toFixed(4)}, ${lng.toFixed(4)}` : 'No GPS data';
}

function _fmtSecs(secs) {
  if (secs == null) return '—';
  const m = Math.floor(secs / 60), s = Math.round(secs % 60);
  return `${m}m ${String(s).padStart(2, '0')}s`;
}

  user_safe:   'User Safe',

                  <div><span className="text-[var(--muted)]">radius:</span> {detail.zone.radius_m}m</div>
                  <div><span className="text-[var(--muted)]">status:</span> {detail.zone.status}</div>
                </div>
              </>
            )}

            {detail.notifications && detail.notifications.length > 0 && (
              <>
                <SectionLabel>Notifications ({detail.notifications.length})</SectionLabel>
                <div className="space-y-1.5 max-h-40 overflow-y-auto">
                  {detail.notifications.map((n, i) => (
                    <div key={i} className="hair border rounded-sm px-3 py-2 text-[12px] flex items-center gap-2">
                      <Tag tone="mist">{n.recipient_type}</Tag>
                      <Tag tone="mist">{n.channel}</Tag>
                      <StatusPill status={n.status === 'sent' || n.status === 'delivered' ? 'Resolved' : n.status === 'failed' ? 'Escalated' : 'Submitted'} dot={false} />
                      {n.sent_at && <span className="ml-auto font-mono text-[10.5px] text-[var(--muted)]">{new Date(n.sent_at).toLocaleTimeString()}</span>}
                    </div>
                  ))}
                </div>
              </>
            )}

            {detail.responses && detail.responses.length > 0 && (
              <>
                <SectionLabel>Responder actions ({detail.responses.length})</SectionLabel>
                <div className="space-y-1.5">
                  {detail.responses.map((r, i) => (
                    <div key={i} className="hair border rounded-sm px-3 py-2 text-[12px] flex items-center gap-2">
                      <Tag tone={r.response_type === 'responding' ? 'sage' : r.response_type === 'flagged_fake' ? 'red' : 'mist'}>{r.response_type}</Tag>
                      {r.distance_m != null && <span className="text-[var(--muted)]">{r.distance_m}m away</span>}
                      <span className="ml-auto font-mono text-[10.5px] text-[var(--muted)]">{new Date(r.created_at).toLocaleTimeString()}</span>
                    </div>
                  ))}
                </div>
              </>
            )}

            {detail.state === 'active' && (
              <div className="flex gap-2 pt-2">
                <PrimaryButton mode="ember" icon="check-circle" size="sm"
                  disabled={!!actionLoading[detail.event_id]}
                  onClick={() => setConfirmAction({ type: 'resolve', eventId: detail.event_id })}>
                  Resolve
                </PrimaryButton>
                <GhostButton danger icon="user-x" size="sm"
                  disabled={!!actionLoading[detail.event_id]}
                  onClick={() => setConfirmAction({ type: 'false', eventId: detail.event_id })}>
                  Mark false alarm
                </GhostButton>
                <GhostButton icon="bell-ring" size="sm"
                  disabled={!!actionLoading[detail.event_id]}
                  onClick={() => handleAck(detail.event_id)}>
                  {actionLoading[detail.event_id] === 'ack' ? '…' : 'Ack'}
                </GhostButton>
              </div>
            )}
          </div>
        )}
      </SlideOver>

      {/* ── Confirm modal for destructive actions ── */}
      <ConfirmModal
        open={!!confirmAction}
        onClose={() => setConfirmAction(null)}
        onConfirm={() => {
          if (!confirmAction) return;
          if (confirmAction.type === 'resolve') handleResolve(confirmAction.eventId);
          if (confirmAction.type === 'false')   handleFalse(confirmAction.eventId);
        }}
        title={confirmAction?.type === 'false' ? 'Mark as false alarm?' : 'Resolve this alert?'}
        body={
          confirmAction?.type === 'false'
            ? 'This will mark the alert as a confirmed false alarm and apply a 30-day ban on the triggering device. This action is permanent and audit-logged.'
            : 'This will mark the alert as formally resolved. The linked zone will be archived. This action is audit-logged.'
        }
        confirmWord={confirmAction?.type === 'false' ? 'BAN' : 'RESOLVE'}
        confirmLabel={confirmAction?.type === 'false' ? 'Mark false & ban device' : 'Resolve alert'}
        tone="red"
      />
    </>
  );
}
