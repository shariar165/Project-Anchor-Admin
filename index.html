};

const ZONE_TYPE_LABELS = {
  university: 'University Zone',
  rape:       'Safety Advisory (Sexual)',
  murder:     'Safety Advisory (Violent)',
  alert:      'Active Alert Zone',
};

function SuperRedZones({ onGo }) {
  const [zones, setZones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [mapError, setMapError] = useState(null);
  const [statusFilter, setStatusFilter] = useState('active');
  const [typeFilters, setTypeFilters] = useState({ rape: true, murder: true, alert: true, university: true });

  // 'list' = zone roster, 'form' = create/edit — both inside the right panel, no overlay
  const [panelMode, setPanelMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ zone_type: 'alert', center_lat: '', center_lng: '', radius_m: 300, label: '', description_public: '', expires_at: '' });
  const [formError, setFormError] = useState(null);
  const [saving, setSaving] = useState(false);

  const [confirmArchive, setConfirmArchive] = useState(null);
  const [archiving, setArchiving] = useState(false);

  const [clickMode, setClickMode] = useState(false);
  const clickModeRef = useRef(false);

  const mapDivRef = useRef(null);
  const leafletMapRef = useRef(null);
  const circleLayersRef = useRef({});

  function load() {
    setLoading(true);
    setLoadError(null);
    AnchorAPI.apiGet('/v1/admin/zones?limit=200')
      .then(data => { setZones(data); setLoading(false); })
      .catch(err => {
        const msg = err.message || 'Failed to load zones';
        setLoadError(msg.includes('Session expired') ? 'Session expired — please sign in again.' : msg);
        setLoading(false);
      });
  }

  useEffect(() => { load(); }, []);

  useEffect(() => { clickModeRef.current = clickMode; }, [clickMode]);

  // Init Leaflet once — guard against CDN not loading
  useEffect(() => {
    if (!mapDivRef.current || leafletMapRef.current) return;
    if (!window.L) {
      setMapError('Map library failed to load. Please refresh the page.');
      return;
    }
    try {
      const map = window.L.map(mapDivRef.current, { zoomControl: true }).setView([23.7450, 90.3718], 12);
      window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19,
      }).addTo(map);
      leafletMapRef.current = map;

      map.on('click', (e) => {
        if (!clickModeRef.current) return;
        setClickMode(false);
        setForm(f => ({
          ...f,
          center_lat: String(e.latlng.lat.toFixed(6)),
          center_lng: String(e.latlng.lng.toFixed(6)),
        }));
        setEditing(null);
        setFormError(null);
        setPanelMode('form');
      });
    } catch (err) {
      setMapError('Map failed to initialise: ' + (err.message || 'unknown error'));
    }

    return () => {
      if (leafletMapRef.current) { leafletMapRef.current.remove(); leafletMapRef.current = null; }
      circleLayersRef.current = {};
    };
  }, []);

  // Redraw circles whenever zones list changes
  useEffect(() => {
    const map = leafletMapRef.current;
    if (!map || !window.L) return;
    Object.values(circleLayersRef.current).forEach(c => c.remove());
    circleLayersRef.current = {};

    zones.forEach(zone => {
      const color = ZONE_COLORS[zone.zone_type] || '#E8312A';
      const isArchived = zone.status === 'archived';
      const circle = window.L.circle([zone.center_lat, zone.center_lng], {
        radius: zone.radius_m,
        color,
        fillColor: color,
        fillOpacity: isArchived ? 0.06 : 0.15,
        weight: isArchived ? 1 : 2,
        dashArray: isArchived ? '5 5' : null,
      });
      const popupLabel = zone.label || ZONE_TYPE_LABELS[zone.zone_type] || zone.zone_type;
      circle.bindPopup(`<strong>${popupLabel}</strong><br/>${zone.zone_type} · ${zone.radius_m}m · ${zone.status}`);
      circle.on('click', (ev) => {
        window.L.DomEvent.stopPropagation(ev);
        openEdit(zone);
      });
      circle.addTo(map);
      circleLayersRef.current[zone.id] = circle;
    });
  }, [zones]);

  function openEdit(zone) {
    setForm({
      zone_type: zone.zone_type,
      center_lat: String(zone.center_lat),
      center_lng: String(zone.center_lng),
      radius_m: zone.radius_m,
      label: zone.label || '',
      description_public: zone.description_public || '',
      expires_at: zone.expires_at ? zone.expires_at.slice(0, 10) : '',
    });
    setEditing(zone);
    setFormError(null);
    setPanelMode('form');
  }

  function closeForm() {
    setPanelMode('list');
    setEditing(null);
    setFormError(null);
    setClickMode(false);
  }

  async function handleSave(e) {
    e.preventDefault();
    const lat = parseFloat(form.center_lat);
    const lng = parseFloat(form.center_lng);
    const radius = parseInt(form.radius_m, 10);
    if (!editing) {
      if (isNaN(lat) || lat < -90 || lat > 90) { setFormError('Latitude must be between -90 and 90'); return; }
      if (isNaN(lng) || lng < -180 || lng > 180) { setFormError('Longitude must be between -180 and 180'); return; }
    }
    if (isNaN(radius) || radius < 50 || radius > 10000) { setFormError('Radius must be between 50 and 10 000 m'); return; }

    setSaving(true);
    setFormError(null);
    try {
      if (editing) {
        await AnchorAPI.apiPatch(`/v1/admin/zones/${editing.id}`, {
          label: form.label || null,
          description_public: form.description_public || null,
          radius_m: radius,
          expires_at: form.expires_at ? new Date(form.expires_at + 'T00:00:00Z').toISOString() : null,
        });
      } else {
        await AnchorAPI.apiPostAuth('/v1/admin/zones', {
          zone_type: form.zone_type,
          center_lat: lat,
          center_lng: lng,
          radius_m: radius,
          label: form.label || null,
          description_public: form.description_public || null,
          expires_at: form.expires_at ? new Date(form.expires_at + 'T00:00:00Z').toISOString() : null,
        });
      }
      closeForm();
      load();
    } catch (err) {
      setFormError(err.message || 'Save failed — please try again');
    } finally {
      setSaving(false);
    }
  }

  async function handleArchive() {
    if (!confirmArchive) return;
    setArchiving(true);
    try {
      await AnchorAPI.apiDelete(`/v1/admin/zones/${confirmArchive.id}`);
    } catch (_) {
      // swallow — reload reflects reality
    } finally {
      setArchiving(false);
      load();
    }
  }

  const filteredZones = zones.filter(z => {
    if (statusFilter !== 'all' && z.status !== statusFilter) return false;
    if (!typeFilters[z.zone_type]) return false;
    return true;
  });

  // ── List panel ────────────────────────────────────────────────────────────
  function renderList() {
    return (
      <>
        <div className="px-4 py-3 hair-b flex items-center justify-between shrink-0">
          <div>
            <div className="text-[13px] font-semibold text-[var(--graphite)]">Red Zone Map</div>
            <div className="text-[10px] text-[var(--muted)] mt-0.5">Super Admin · Platform-wide</div>
          </div>
          <button
            onClick={() => setClickMode(true)}
            className="px-2.5 py-1 text-[12px] font-medium rounded-sm flex items-center gap-1.5 text-white"
            style={{ background: 'var(--ember)' }}
          >
            <Icon name="plus" size={12} />
            New
          </button>
        </div>

        {loadError && (
          <div className="mx-3 mt-3 px-3 py-2 rounded-sm text-[12px] flex items-start gap-2 shrink-0" style={{ background: 'var(--ember-tint)', color: 'var(--ember)' }}>
            <Icon name="circle-alert" size={13} className="mt-0.5 shrink-0" />
            <span className="flex-1 leading-snug">{loadError}</span>
            <button onClick={load} className="underline ml-1 shrink-0">Retry</button>
          </div>
        )}

        <div className="px-4 py-2 hair-b flex items-center gap-1.5 flex-wrap shrink-0">
          {['active', 'archived', 'all'].map(s => (
            <button
              key={s}
              onClick={() => setStatusFilter(s)}
              className="px-2.5 py-0.5 rounded-full text-[11px] font-medium capitalize"
              style={
                statusFilter === s
                  ? { background: 'var(--ember)', color: 'white' }
                  : { background: 'var(--mist)', color: 'var(--muted)' }
              }
            >
              {s}
            </button>
          ))}
          <div className="ml-auto flex gap-2 items-center">
            {Object.entries(typeFilters).map(([type, on]) => (
              <button
                key={type}
                onClick={() => setTypeFilters(f => ({ ...f, [type]: !f[type] }))}
                title={ZONE_TYPE_LABELS[type]}
                className="w-3 h-3 rounded-full border-2"
                style={{
                  borderColor: ZONE_COLORS[type],
                  background: on ? ZONE_COLORS[type] : 'transparent',
                  opacity: on ? 1 : 0.3,
                }}
              />
            ))}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto scrollbar-none">
          {loading && (
            <div className="flex items-center justify-center py-10 gap-2 text-[var(--muted)] text-[13px]">
              <Icon name="loader-circle" size={15} />
              Loading…
            </div>
          )}
          {!loading && !loadError && filteredZones.length === 0 && (
            <div className="flex flex-col items-center justify-center py-10 px-4 text-center">
              <Icon name="map-pin-off" size={26} className="mb-2 text-[var(--muted)]" />
              <p className="text-[12px] text-[var(--muted)]">No zones match this filter.</p>
              <button
                onClick={() => setClickMode(true)}
                className="mt-3 text-[12px] underline"
                style={{ color: 'var(--ember)' }}
              >
                Create the first zone
              </button>
            </div>
          )}
          {!loading && filteredZones.map(zone => (
            <div
              key={zone.id}
              className="px-4 py-3 hair-b last:border-0 hover:bg-[var(--mist)]/20 group cursor-pointer"
              onClick={() => openEdit(zone)}
            >
              <div className="flex items-start gap-2.5">
                <span
                  className="mt-1 w-2.5 h-2.5 rounded-full shrink-0"
                  style={{ background: ZONE_COLORS[zone.zone_type] }}
                />
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <span className="text-[12px] font-semibold text-[var(--graphite)] truncate">
                      {zone.label || ZONE_TYPE_LABELS[zone.zone_type]}
                    </span>
                    {zone.status === 'archived' && (
                      <span
                        className="text-[10px] px-1.5 py-0.5 rounded-full font-medium shrink-0"
                        style={{ background: 'var(--mist)', color: 'var(--muted)' }}
                      >
                        archived
                      </span>
                    )}
                  </div>
                  <div className="flex gap-1.5 mt-0.5 flex-wrap">
                    <span className="text-[11px] text-[var(--muted)]">{zone.zone_type}</span>
                    <span className="text-[11px] text-[var(--muted)]">·</span>
                    <span className="text-[11px] text-[var(--muted)]">{zone.radius_m}m</span>
                    <span className="text-[11px] text-[var(--muted)]">·</span>
                    <span className="text-[11px] text-[var(--muted)] font-mono">
                      {parseFloat(zone.center_lat).toFixed(4)}, {parseFloat(zone.center_lng).toFixed(4)}
                    </span>
                  </div>
                </div>
                <Icon name="chevron-right" size={14} className="text-[var(--mist)] group-hover:text-[var(--muted)] shrink-0 mt-0.5" />
              </div>
            </div>
          ))}
        </div>
      </>
    );
  }

  // ── Form panel ────────────────────────────────────────────────────────────
  function renderForm() {
    return (
      <div className="flex flex-col h-full">
        <div className="px-4 py-3 hair-b flex items-center gap-2 shrink-0">
          <button
            onClick={closeForm}
            className="flex items-center gap-1 text-[12px] text-[var(--muted)] hover:text-[var(--graphite)] transition-colors"
          >
            <Icon name="chevron-left" size={14} />
            Zones
          </button>
          <span className="text-[var(--mist)]">/</span>
          <span className="text-[13px] font-semibold text-[var(--graphite)]">
            {editing ? 'Edit Zone' : 'New Zone'}
          </span>
        </div>

        <div className="flex-1 overflow-y-auto scrollbar-none px-4 py-4 space-y-4">

          {!editing && (
            <AuditNote tone="red" icon="map-pin">
              Zone appears immediately on the public Anchor map.
            </AuditNote>
          )}

          {formError && (
            <div className="px-3 py-2 rounded-sm text-[12px] flex items-start gap-2" style={{ background: 'var(--ember-tint)', color: 'var(--ember)' }}>
              <Icon name="circle-alert" size={13} className="mt-0.5 shrink-0" />
              <span>{formError}</span>
            </div>
          )}

          <form id="zone-form" onSubmit={handleSave} className="space-y-4">

            <div>
              <label className="block text-[11px] font-semibold text-[var(--graphite)] uppercase tracking-wide mb-2">Zone Type</label>
              <div className="grid grid-cols-2 gap-1.5">
                {Object.entries(ZONE_TYPE_LABELS).map(([type, lbl]) => {
                  const active = form.zone_type === type;
                  const color = ZONE_COLORS[type];
                  return (
                    <button
                      key={type}
                      type="button"
                      disabled={!!editing}
                      onClick={() => !editing && setForm(f => ({ ...f, zone_type: type }))}
                      className="px-2.5 py-2 rounded-sm border text-left text-[11px] flex items-center gap-2 transition-all"
                      style={
                        active
                          ? { borderColor: color, background: color + '18', color: color === '#0B0B0B' ? '#1a1a1a' : color, fontWeight: 600 }
                          : editing
                            ? { borderColor: 'var(--mist)', color: 'var(--muted)', opacity: 0.5, cursor: 'not-allowed' }
                            : { borderColor: 'var(--mist)', color: 'var(--graphite)' }
                      }
                    >
                      <span className="w-2 h-2 rounded-full shrink-0" style={{ background: color }} />
                      <span className="leading-tight">{lbl}</span>
                    </button>
                  );
                })}
              </div>
              {editing && <p className="text-[11px] mt-1" style={{ color: 'var(--muted)' }}>Type is fixed after creation.</p>}
            </div>

            {!editing ? (
              <div>
                <label className="block text-[11px] font-semibold text-[var(--graphite)] uppercase tracking-wide mb-1">Location</label>
                <div className="grid grid-cols-2 gap-2 mb-1">
                  <input
                    type="number" step="any" value={form.center_lat}
                    onChange={e => setForm(f => ({ ...f, center_lat: e.target.value }))}
                    required placeholder="Latitude"
                    className="w-full px-2.5 py-2 hair border rounded-sm bg-white text-[12px]"
                  />
                  <input
                    type="number" step="any" value={form.center_lng}
                    onChange={e => setForm(f => ({ ...f, center_lng: e.target.value }))}
                    required placeholder="Longitude"
                    className="w-full px-2.5 py-2 hair border rounded-sm bg-white text-[12px]"
                  />
                </div>
                <p className="text-[11px]" style={{ color: 'var(--muted)' }}>
                  Or{' '}
                  <button
                    type="button"
                    onClick={() => { closeForm(); setClickMode(true); }}
                    className="underline"
                    style={{ color: 'var(--ember)' }}
                  >
                    click the map
                  </button>
                  {' '}to pin a location.
                </p>
              </div>
            ) : (
              <div>
                <label className="block text-[11px] font-semibold text-[var(--graphite)] uppercase tracking-wide mb-1">Location (fixed)</label>
                <div className="px-2.5 py-2 rounded-sm text-[12px] font-mono" style={{ background: 'var(--mist)', color: 'var(--graphite)' }}>
                  {parseFloat(form.center_lat).toFixed(5)}, {parseFloat(form.center_lng).toFixed(5)}
                </div>
              </div>
            )}

            <div>
              <label className="block text-[11px] font-semibold text-[var(--graphite)] uppercase tracking-wide mb-1">
                Radius — <span className="font-mono">{form.radius_m} m</span>
              </label>
              <div className="flex gap-2 items-center">
                <input
                  type="range" min={50} max={5000} step={50}
                  value={form.radius_m}
                  onChange={e => setForm(f => ({ ...f, radius_m: parseInt(e.target.value, 10) }))}
                  className="flex-1"
                />
                <input
                  type="number" min={50} max={10000}
                  value={form.radius_m}
                  onChange={e => setForm(f => ({ ...f, radius_m: Math.max(50, parseInt(e.target.value, 10) || 50) }))}
                  className="w-20 px-2 py-1.5 hair border rounded-sm bg-white text-[12px] text-right"
                />
              </div>
            </div>

            <div>
              <label className="block text-[11px] font-semibold text-[var(--graphite)] uppercase tracking-wide mb-1">
                Label <span className="text-[var(--muted)] normal-case font-normal">(optional)</span>
              </label>
              <input
                value={form.label}
                onChange={e => setForm(f => ({ ...f, label: e.target.value }))}
                placeholder={ZONE_TYPE_LABELS[form.zone_type]}
                className="w-full px-2.5 py-2 hair border rounded-sm bg-white text-[12px]"
              />
            </div>

            <div>
              <label className="block text-[11px] font-semibold text-[var(--graphite)] uppercase tracking-wide mb-1">
                Public description <span className="text-[var(--muted)] normal-case font-normal">(optional)</span>
              </label>
              <textarea
                rows={3}
                value={form.description_public}
                onChange={e => setForm(f => ({ ...f, description_public: e.target.value }))}
                placeholder="Shown in the zone popup on the public map."
                className="w-full px-2.5 py-2 hair border rounded-sm bg-white text-[12px] resize-none"
              />
            </div>

            <div>
              <label className="block text-[11px] font-semibold text-[var(--graphite)] uppercase tracking-wide mb-1">
                Expires on <span className="text-[var(--muted)] normal-case font-normal">(blank = no expiry)</span>
              </label>
              <input
                type="date"
                value={form.expires_at}
                onChange={e => setForm(f => ({ ...f, expires_at: e.target.value }))}
                className="w-full px-2.5 py-2 hair border rounded-sm bg-white text-[12px]"
              />
            </div>
          </form>

          {/* Archive danger section — only shown when editing an active zone */}
          {editing && editing.status === 'active' && (
            <div className="pt-2 mt-2 border-t hair">
              <p className="text-[11px] font-semibold uppercase tracking-wide mb-2" style={{ color: 'var(--ember)' }}>Danger zone</p>
              <button
                type="button"
                onClick={() => setConfirmArchive(editing)}
                className="w-full flex items-center gap-2 px-3 py-2 rounded-sm border text-[12px] transition-colors"
                style={{ borderColor: 'var(--ember)', color: 'var(--ember)', background: 'var(--ember-tint)' }}
              >
                <Icon name="archive" size={13} />
                Archive this zone
              </button>
              <p className="text-[11px] mt-1" style={{ color: 'var(--muted)' }}>
                Removes zone from the public map immediately.
              </p>
            </div>
          )}
        </div>

        <div className="px-4 py-3 hair-t flex gap-2 shrink-0">
          <PrimaryButton
            as="button"
            type="submit"
            form="zone-form"
            mode="ember"
            icon={editing ? 'save' : 'map-pin'}
            disabled={saving}
            className="flex-1 justify-center"
          >
            {saving ? 'Saving…' : editing ? 'Save changes' : 'Create zone'}
          </PrimaryButton>
          <GhostButton type="button" onClick={closeForm}>Cancel</GhostButton>
        </div>
      </div>
    );
  }

  return (
    <div className="flex gap-4" style={{ height: 'calc(100vh - 84px)', minHeight: 500 }}>

      {/* ── Leaflet map (left, fills remaining space) ── */}
      <div className="flex-1 rounded-sm overflow-hidden border hair relative" style={{ minWidth: 0 }}>
        {mapError ? (
          <div className="w-full h-full flex flex-col items-center justify-center p-6 text-center" style={{ background: 'var(--mist)' }}>
            <Icon name="map-off" size={32} className="mb-3 text-[var(--muted)]" />
            <p className="text-[13px] text-[var(--graphite)]">{mapError}</p>
          </div>
        ) : (
          <>
            {clickMode && (
              <div
                className="absolute top-3 z-[1000] px-3 py-1.5 rounded text-[12px] font-medium flex items-center gap-2"
                style={{
                  left: '50%', transform: 'translateX(-50%)',
                  background: 'var(--ember)', color: 'white',
                  boxShadow: 'var(--shadow)', pointerEvents: 'all',
                }}
              >
                <Icon name="map-pin" size={13} />
                Click map to place zone
                <button
                  onClick={() => setClickMode(false)}
                  style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, opacity: 0.8, display: 'flex' }}
                >
                  <Icon name="x" size={12} />
                </button>
              </div>
            )}
            <div
              ref={mapDivRef}
              className="w-full h-full"
              style={{ cursor: clickMode ? 'crosshair' : undefined }}
            />
          </>
        )}
      </div>

      {/* ── Right panel: list or form, no overlay ── */}
      <div
        className="flex flex-col rounded-sm border hair bg-[var(--paper)] overflow-hidden"
        style={{ width: 340, flexShrink: 0 }}
      >
        {panelMode === 'list' ? renderList() : renderForm()}
      </div>

      {/* ── Archive confirm modal ── */}
      <ConfirmModal
        open={!!confirmArchive}
        onClose={() => { setConfirmArchive(null); }}
        onConfirm={handleArchive}
        title="Archive this zone?"
        body={confirmArchive
          ? `"${confirmArchive.label || ZONE_TYPE_LABELS[confirmArchive.zone_type]}" will be removed from the public map immediately. The record is preserved in audit history.`
          : ''}
        confirmWord="ARCHIVE"
        confirmLabel={archiving ? 'Archiving…' : 'Archive zone'}
        tone="red"
      />
    </div>
  );
}


Object.assign(window, { SuperDashboard, SuperTenants, SuperOnboard, SuperTenantDetail, SuperAuditLogs, SuperDeanonymization, SuperVerificationFeed, SuperAIHealth, SuperAlerts, SuperModeration, SuperUsers, SuperRedZones });

<script type="text/babel">
// Full Settings screen for both University Admin and Super Admin
var { useState, useEffect, useCallback, useRef, useMemo } = React;
function SettingsScreen({ mode='uni', dark, setDark, onGo }) {

  const NAV = mode==='uni' ? [

  return (
    <>
      <PageHeader

      <div className="grid gap-5" style={{ gridTemplateColumns:'240px 1fr' }}>

          <div className="p-3">
            {NAV.map((grp, i) => (
              <div key={grp.group} className={i>0?'mt-3':''}>
                <div className="smallcaps text-[var(--muted)] px-2 pb-1.5">{grp.group}</div>
                <div className="flex flex-col gap-0.5">

                    <button key={it.id} onClick={()=>setSection(it.id)}

                      <Icon name={it.icon} size={14} />
                      <span>{it.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </Card>

        {/* Content */}

          {section==='appearance' && <AppearanceSection dark={dark} setDark={setDark} mode={mode} accent={accent} />}
          {section==='notifications' && <NotificationsSection mode={mode} />}
          {section==='language' && <LanguageSection mode={mode} />}
          {section==='security' && <SecuritySection mode={mode} />}

          {/* university only */}
          {section==='escalation' && <EscalationRulesSection />}
          {section==='routing' && <RoutingRulesSection />}
          {section==='anonymity' && <AnonymitySection />}
          {section==='hierarchy' && <HierarchySection />}
          {section==='hours' && <HoursSection />}
          {section==='audit-request' && <AuditAccessRequestSection />}
          {section==='export' && <ExportRetentionSection />}

          {/* super admin only */}
          {section==='platform-escalation' && <PlatformEscalationSection />}
          {section==='rate-limits' && <RateLimitsSection />}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script src="src/uni-timetable.jsx" type="text/babel"></script>
<script type="text/babel">
// Router and app root
var { useState, useEffect, useCallback, useRef, useMemo } = React;
function useHashRoute() {
  const [hash, setHash] = useState(() => window.location.hash.slice(1) || '/');
  useEffect(() => {
    const onHash = () => setHash(window.location.hash.slice(1) || '/');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const go = useCallback((route) => {
    window.location.hash = route;
    window.scrollTo(0, 0);
  }, []);
  return [hash, go];
}

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "palette": "civic",
  "voice": "serif",
  "surface": "paper"
}/*EDITMODE-END*/;

function App() {
  const [route, onGo] = useHashRoute();
  const [role, setRole] = useState('Department Head');
  const [dark, setDark] = useDark();
  const [t, setTweak] = useTweaks(TWEAK_DEFAULS);
  const [auth, setAuth] = useState(() => AnchorAPI.getStoredUser());

  const onLogin = useCallback((user) => setAuth(user), []);
  const onLogout = useCallback(() => {
    AnchorAPI.clearAuth();
    setAuth(null);
    window.location.hash = '/';
  }, []);

  // Apply tweak choices as data-attributes on <html> so global CSS rules respond.
  useEffect(() => { document.documentElement.setAttribute('data-palette', t.palette); }, [t.palette]);
  useEffect(() => { document.documentElement.setAttribute('data-voice', t.voice); }, [t.voice]);
  useEffect(() => { document.documentElement.setAttribute('data-surface', t.surface); }, [t.surface]);

  const tweaksUI = (
    <TweaksPanel>
      <TweakSection label="Palette" />
      <TweakRadio label="Story" value={t.palette}
        options={['civic','court','field','ops']}
        onChange={v => setTweak('palette', v)} />

      <TweakSection label="Voice" />
      <TweakRadio label="Heading type" value={t.voice}
        options={['serif','sans','mono']}
        onChange={v => setTweak('voice', v)} />

      <TweakSection label="Surface" />
      <TweakRadio label="Material" value={t.surface}
        options={['paper','slate','canvas']}
        onChange={v => setTweak('surface', v)} />
    </TweaksPanel>
  );

  // Route to view
  let view;
  if (route === '/' || route === '') view = <EntrySwitcher onGo={onGo} dark={dark} setDark={setDark} />;
  else if (route === '/university/login') view = <LoginScreen mode="uni" onGo={onGo} onLogin={onLogin} />;
  else if (route === '/super/login') view = <LoginScreen mode="sup" onGo={onGo} onLogin={onLogin} />;
  else if (route.startsWith('/university')) {
    if (!auth) {
      view = <LoginScreen mode="uni" onGo={onGo} onLogin={onLogin} />;
    } else {
      view = (
        <AdminShell mode="uni" route={route} onGo={onGo} role={role} setRole={setRole} dark={dark} setDark={setDark} breadcrumbs={uniCrumbs(route)} auth={auth} onLogout={onLogout}>
          {uniView(route, onGo, role, dark, setDark)}
        </AdminShell>
      );
    }
  } else if (route.startsWith('/super')) {
    if (!auth) {
      view = <LoginScreen mode="sup" onGo={onGo} onLogin={onLogin} />;
    } else {
      view = (
        <AdminShell mode="sup" route={route} onGo={onGo} role={role} setRole={setRole} dark={dark} setDark={setDark} breadcrumbs={supCrumbs(route)} auth={auth} onLogout={onLogout}>
          {supView(route, onGo, dark, setDark)}
        </AdminShell>
      );
    }
  } else {
    view = <EntrySwitcher onGo={onGo} dark={dark} setDark={setDark} />;
  }
  return <>{view}{tweaksUI}</>;
}

function uniCrumbs(route) {
  const map = {
    '/university/dashboard':['Dashboard'],
    '/university/complaints':['Complaints'],
    '/university/grievances/teachers':['Grievances','Teacher'],
    '/university/grievances/departments':['Grievances','Department'],
    '/university/classrooms':['Classroom reports'],
    '/university/hostel':['Hostel'],
    '/university/alerts':['Campus geofence'],
    '/university/geofence':['Campus geofence'],
    '/university/routine':['Routine builder'],
    '/university/timetable':['Timetable generator'],
    '/university/notices':['Notices'],
    '/university/verification-feed':['Verification feed'],
    '/university/analytics':['Analytics'],
    '/university/users':['Users'],
    '/university/settings':['Settings'],
    '/university/profile':['Profile'],
  };
  return map[route] || ['—'];
}

function supCrumbs(route) {
  const map = {
    '/super/dashboard':['Dashboard'],
    '/super/tenants':['Tenants','Universities'],
    '/super/onboard':['Tenants','Onboard'],
    '/super/audit-logs':['Operations','Audit logs'],
    '/super/alerts':['Operations','Campus alerts'],
    '/super/red-zones':['Operations','Red zone map'],
    '/super/moderation':['Operations','Content moderation'],
    '/super/deanonymization':['Operations','De-anonymization'],
    '/super/verification-feed':['Operations','Verification feed'],
    '/super/users':['Operations','Users'],
    '/super/dms':['Operations','Dead man\u2019s switch'],
    '/super/ai-health':['System','AI engine health'],
    '/super/encryption':['System','Encryption & keys'],
    '/super/analytics':['System','Analytics'],
    '/super/incidents':['System','Incidents'],
    '/super/policy':['Configuration','Policy'],
    '/super/legal-corpus':['Configuration','Legal corpus'],
    '/super/team':['Team','Members'],
    '/super/settings':['Team','Settings'],
    '/super/profile':['Team','Profile'],
  };
  if (route.startsWith('/super/tenant/')) return ['Tenants', 'Detail'];
  return map[route] || ['—'];
}

function uniView(route, onGo, role, dark, setDark) {
  switch (route) {
    case '/university/dashboard': return <UniDashboard role={role} onGo={onGo} />;
    case '/university/complaints': return <UniComplaints onGo={onGo} />;
    case '/university/routine': return <UniRoutine onGo={onGo} />;
    case '/university/timetable': return <UniTimetable onGo={onGo} />;
    case '/university/notices': return <UniNotices onGo={onGo} />;
    case '/university/geofence': return <UniGeofence onGo={onGo} />;
    case '/university/alerts': return <UniGeofence onGo={onGo} />;
    case '/university/classrooms': return <UniClassrooms onGo={onGo} />;
    case '/university/grievances/teachers': return <UniTeacherGrievances />;
    case '/university/grievances/departments': return <UniDeptGrievances />;
    case '/university/hostel': return <UniHostel />;
    case '/university/verification-feed': return <UniVerificationFeed />;
    case '/university/analytics': return <StubScreen title="Department analytics" description="Aggregate, anonymized analytics for your department." icon="bar-chart-3"
      items={['Complaint trends','Resolution rate','Escalation rate','Avg response time','Day × hour heatmap']} />;
    case '/university/users': return <StubScreen title="Users" description="Students, teachers, and admin staff in your tenant. CSV import, role assignment, deactivation." icon="users"
      items={['Students · 8,421','Teachers · 142','Admin staff · 14','Pending verification · 42']} />;
    case '/university/settings': return <SettingsScreen mode="uni" dark={dark} setDark={setDark} onGo={onGo} />;
    case '/university/profile': return <StubScreen title="My profile" description="Account, role, permissions, and MFA." icon="circle-user"
      items={['Personal info','Role & permissions','MFA settings','Recent activity']} />;
    default: return <StubScreen title="Not found" description="The page you\u2019re looking for isn\u2019t in this demo build yet." />;
  }
}

function supView(route, onGo, dark, setDark) {
  if (route.startsWith('/super/tenant/')) {
    const id = route.split('/').pop();
    return <SuperTenantDetail id={id} onGo={onGo} />;
  }
  switch (route) {
    case '/super/dashboard': return <SuperDashboard onGo={onGo} />;
    case '/super/tenants': return <SuperTenants onGo={onGo} />;
    case '/super/onboard': return <SuperOnboard onGo={onGo} />;
    case '/super/audit-logs': return <SuperAuditLogs />;
    case '/super/alerts': return <SuperAlerts onGo={onGo} />;
    case '/super/red-zones': return <SuperRedZones onGo={onGo} />;
    case '/super/moderation': return <SuperModeration />;
    case '/super/deanonymization': return <SuperDeanonymization />;
    case '/super/verification-feed': return <SuperVerificationFeed />;
    case '/super/ai-health': return <SuperAIHealth />;
    case '/super/users': return <SuperUsers />;
    case '/super/dms': return <StubScreen title="Dead Man\u2019s Switch" description="Active DMS cases per tenant, recent triggers, service health. Super Admin cannot read encrypted content." icon="lock-keyhole"
      items={['Active cases · 24','Triggered · 30d · 0','Recipient verification · 18','Service health · OK']} />;
    case '/super/encryption': return <StubScreen title="Encryption & keys" description="Master key rotation, session/chat keys count, KMS health, certificate expiry." icon="key-round"
      items={['Master key · rotated 14d ago','Active session keys · 12,847','KMS health · OK','Certificates · 3 expiring in 90d']} />;
    case '/super/analytics': return <StubScreen title="Platform-wide analytics" description="Cross-tenant aggregate dashboards. All anonymized." icon="bar-chart-3"
      items={['Complaints per week (stacked)','Resolution rates by tenant','Alert frequency heatmap (national)','Most cited laws (RAG)','Lawyer engagement','Verification feed activity']} />;
    case '/super/incidents': return <StubScreen title="Incidents" description="Ongoing technical, security and content incidents. Playbooks and post-mortems." icon="flame"
      items={['Active incidents · 1','Playbooks · 14','Post-mortems · 22']} />;
    case '/super/policy': return <StubScreen title="Policy & configuration" description="Platform-wide settings: escalation timers, rate limits, trust thresholds, ban durations." icon="scale"
      items={['Escalation timers','Rate limits','Trust thresholds (5 / 10 / 15)','Ban durations','AI confidence thresholds','Legal disclaimer (Bangla + English)','Bangladesh PDP Ordinance 2025']} />;
    case '/super/legal-corpus': return <StubScreen title="Legal corpus · RAG" description="Manage the legal corpus that feeds ChromaDB across tenant namespaces." icon="book-open"
      items={['Constitution','Laws & Acts','Court judgments','FIR / GD templates','University policies (per tenant)','Indexing jobs']} />;
    case '/super/team': return <StubScreen title="Team members" description="Super admin accounts, role assignments, MFA enforcement, access levels." icon="users"
      items={['Members · 6','MFA enforced · 6/6','Recent activity']} />;
    case '/super/profile': return <StubScreen title="My profile" description="Super admin account and security settings." icon="circle-user" />;
    case '/super/settings': return <SettingsScreen mode="sup" dark={dark} setDark={setDark} onGo={onGo} />;
    default: return <StubScreen title="Not found" description="The page you\u2019re looking for isn\u2019t in this demo build yet." />;
  }
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 40, fontFamily: 'monospace', color: '#E8312A', background: '#F7F3EE', minHeight: '100vh' }}>
          <strong style={{ fontSize: 16 }}>Admin panel render error</strong>
          <pre style={{ marginTop: 12, fontSize: 13, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>{String(this.state.error)}</pre>
          <p style={{ marginTop: 8, fontSize: 12, color: '#6B7785' }}>Open browser DevTools → Console for the full stack trace.</p>
        </div>
      );
    }
    return this.props.children;
  }
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>

<script>
  window.addEventListener('load', () => { if (window.lucide) window.lucide.createIcons(); });
</script>
